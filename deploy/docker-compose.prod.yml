# Phase 19 production stack: postgres + api_server + caddy on the Hetzner box.
#
# Invariants:
#   - No public Postgres port (compose-internal only).
#   - caddy_data named volume persists ACME certs across container restarts (Pitfall 7).
#   - api_server mounts /var/run/docker.sock (D-08 accepted risk; see deploy/README.md).
#   - DOCKER_GID build arg is set by deploy/deploy.sh from `stat -c %g /var/run/docker.sock`.
#   - AP_ENV=prod gates /docs closed (D-10); AP_TRUSTED_PROXY=true because Caddy is in front.
#
# Deploy is via deploy/deploy.sh (pull → build → [BLOCKING] alembic upgrade head → roll).

services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ap
      POSTGRES_DB: agent_playground_api
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    secrets: [pg_password]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ap -d agent_playground_api"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    # Phase 22c.3 (D-08 + D-11): Redis Pub/Sub fan-out for inapp chat events.
    # Loopback-only inside the compose network — NO `ports:` block, so the
    # external host has no path to this service. Caddy is in front for
    # public ingress, not Redis. (D-08 hardening rule: never expose Redis
    # publicly; the bridge network IS the security boundary.)
    #
    # NOTE on protected-mode: Redis 7's `--protected-mode yes` is designed
    # for the case where Redis binds to 0.0.0.0 with no auth on a hostile
    # public network — it silently RST-closes any non-loopback client.
    # That semantic does NOT match this deploy: redis here lives on a
    # private compose bridge network, has no host port in the prod
    # compose, and api_server is the only client (which connects from
    # the bridge IP, not loopback). Leaving protected-mode on therefore
    # blocks the legitimate api_server connection (verified empirically
    # — `Connection reset by peer` from `redis.asyncio.from_url` calls).
    # Disabling it is correct because the security boundary is the
    # bridge network itself (D-08), not the per-process Redis flag.
    # Local override (deploy/docker-compose.local.yml) does expose
    # 127.0.0.1:6379 for host-venv tests, which is host-loopback-only
    # too, so still no public exposure.
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--protected-mode", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api_server:
    build:
      context: ..
      dockerfile: tools/Dockerfile.api
      args:
        DOCKER_GID: ${DOCKER_GID:-999}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AP_ENV: prod
      AP_TRUSTED_PROXY: "true"
      AP_MAX_CONCURRENT_RUNS: "2"
      AP_RECIPES_DIR: /app/recipes
      # Phase 22c.3 (D-08): Redis Pub/Sub URL — compose-internal hostname
      # (the `redis` service above). The outbox pump publishes here; the
      # SSE handler subscribes here. No host port; no public exposure.
      AP_REDIS_URL: "redis://redis:6379/0"
      # NOTE: password is injected via env_file (.env.prod) so the secret never
      # appears in compose config output or `docker inspect`. deploy.sh writes
      # .env.prod from secrets/pg_password at deploy time.
      DATABASE_URL: postgresql+asyncpg://ap:${POSTGRES_PASSWORD}@postgres:5432/agent_playground_api
      # Phase 22-02: channel credential encryption master key (32 bytes base64).
      # Sourced from .env.prod via env_file below. When unset AND AP_ENV=prod,
      # the crypto module raises on first use (fail-loud). In dev (AP_ENV=dev)
      # the helper falls back to 32 zero bytes — never ship that fallback.
      AP_CHANNEL_MASTER_KEY: ${AP_CHANNEL_MASTER_KEY}
    env_file:
      - .env.prod
    volumes:
      # ACCEPTED trust boundary (D-08) — runner shells out to `docker` CLI.
      - /var/run/docker.sock:/var/run/docker.sock
      - ../recipes:/app/recipes:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data              # Pitfall 7 — persistent ACME cert storage
      - caddy_config:/config
    depends_on:
      - api_server

volumes:
  pgdata:
  caddy_data:
  caddy_config:

secrets:
  pg_password:
    file: ./secrets/pg_password
