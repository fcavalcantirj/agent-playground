apiVersion: ap.recipe/v0.2
name: nullclaw
display_name: NullClaw
description: |
  "Null overhead. Null compromise. 100% Zig. 100% Agnostic." A static
  Zig binary — 678 KB, ~1 MB RAM, <2 ms boot — that runs the full
  self-improving agent stack (50+ providers, 19 channels, 35+ tools,
  10 memory engines). This recipe targets `nullclaw agent -m` with a
  sh-chained `nullclaw onboard` to inject the OpenRouter API key
  before the one-shot turn.

source:
  repo: https://github.com/nullclaw/nullclaw
  ref: main
  ref_note: |
    NullClaw ships a static binary (no runtime, no VM). v0 of this
    recipe tracks main. `build.zig.zon` reports version 2026.4.9;
    this may drift ahead as upstream releases.
  upstream_version: 2026.4.9+

build:
  mode: upstream_dockerfile
  dockerfile: Dockerfile
  context: .
  notes: |
    Upstream multi-stage Dockerfile cross-compiles Zig (ReleaseSmall)
    for linux/amd64 or linux/arm64 depending on the host. Base runtime
    is alpine:3.23 with ca-certificates/curl/tzdata. Non-root user
    (uid/gid 65534) by default — `release-root` target exists for
    autonomous mode (not used here).

    ENV set in Dockerfile:
      NULLCLAW_WORKSPACE=/nullclaw-data/workspace
      NULLCLAW_HOME=/nullclaw-data
      HOME=/nullclaw-data
      NULLCLAW_GATEWAY_PORT=3000

    ENTRYPOINT is ["nullclaw"], CMD is ["gateway","--port","3000","--host","::"].
    We override CMD by passing our own argv (via sh entrypoint chain).

    **Unique property in our recipe set:** the Dockerfile config stage
    pre-templates `/nullclaw-data/config.json` with
    `agents.defaults.model.primary = "openrouter/anthropic/claude-sonnet-4"`
    and an empty `models.providers.openrouter` entry. OpenRouter is
    first-class in the shipping config; we only need to inject the API
    key at run time via `nullclaw onboard --api-key ... --provider openrouter`.

runtime:
  provider: openrouter
  process_env:
    api_key: OPENROUTER_API_KEY
    api_key_fallback: null
    base_url: null
    model: null
  volumes:
    - name: nullclaw_data
      host: per_session_tmpdir
      container: /nullclaw-data
      mode: rw
      ephemeral: true
      owner_uid: 65534
      notes: |
        NULLCLAW_HOME. The upstream Dockerfile chowns this to 65534:65534
        and pre-populates config.json + workspace/. We bind a per-session
        tmpdir so state is ephemeral. The sh bootstrap writes via
        `nullclaw onboard`, which mutates config.json in place.
  warnings:
    - id: two_step_onboard_then_agent
      rule: "`nullclaw onboard` must run before `nullclaw agent -m` to inject the OpenRouter API key"
      reason: |
        The baked config.json declares the openrouter provider but ships
        with no API key (empty `{}`). A fresh container has no credential
        material until onboard writes it. `nullclaw onboard
        --api-key ... --provider openrouter` is the documented
        non-interactive setup path (per docs/en/commands.md:43).
    - id: sh_entrypoint_override
      rule: Override --entrypoint to sh so we can chain onboard+agent in one container
      reason: |
        Default ENTRYPOINT is `nullclaw`, so a single docker run only
        executes one nullclaw subcommand. To run onboard THEN agent
        inside the same container lifetime (no persisted state between
        runs), we override the entrypoint to sh and chain both commands
        in a single -c script. Alpine ships busybox sh.
    - id: nonroot_volume_ownership
      rule: Container runs as UID 65534 (nobody); host bind mount must be writable for that UID
      reason: |
        `release` target in the upstream Dockerfile sets `USER 65534:65534`
        and chowns /nullclaw-data accordingly. On Docker Desktop for Mac
        the bind-mount shim handles this; on Linux hosts the mounted
        tmpdir needs to be 0777 or chowned to 65534 before mounting.

invoke:
  mode: cli-passthrough
  spec:
    entrypoint: sh
    argv:
      - -c
      - |
        set -e
        nullclaw onboard --api-key "${OPENROUTER_API_KEY}" --provider openrouter --model "openrouter/$MODEL" >/dev/null 2>&1
        nullclaw agent -m "$PROMPT" --model "openrouter/$MODEL"
    argv_note: |
      Two-step sh chain inside a single container:
        1. `nullclaw onboard --api-key $OPENROUTER_API_KEY --provider openrouter --model openrouter/<model>`
           Writes the key + provider selection + default model to config.json
           (stdout discarded — it prints an interactive-ish banner even
           with flags). Per docs/en/commands.md:43 this is a valid
           non-interactive invocation.
        2. `nullclaw agent -m "<prompt>" --model "openrouter/<model>"`
           Runs the one-shot agent turn. `--model` pins the session
           model and bypasses any auto-routing.

      Substitution order: the runner replaces $PROMPT and $MODEL BEFORE
      docker run. sh interpolates ${OPENROUTER_API_KEY} at container
      runtime from the process env.
    stdout_filter:
      engine: awk
      program: "{print}"  # v0 pass-through; refine after first run
    session_id_capture:
      engine: none

smoke:
  # NOTE: unlike hermes/openclaw/picoclaw, nullclaw's default agent persona
  # is a DELIBERATE blank slate — ask "who are you?" and it answers that it
  # has no name yet and asks the user to give it one. So the standard
  # response_contains_name probe falls back on a prompt that *forces* the
  # agent name into the reply by asking a question that can't be answered
  # without it.
  prompt: "What is NullClaw? Reply in one short sentence starting with 'NullClaw is'."
  pass_if: response_contains_name
  case_insensitive: true
  timeout_s: 90
  verified_cells:
    - model: anthropic/claude-haiku-4.5
      verdict: PASS
      wall_time_s: 2.42
      notes: |
        Reply: "NullClaw is an AI agent framework that gives you a
        persistent, autonomous assistant with memory, multi-channel
        access, and deep integration into your workspace and tools."
        Tied with picoclaw for fastest end-to-end (2.5s) despite the
        two-step onboard+agent chain, because the Zig binary is ~678 KB
        and boots in <8 ms. Model adopted a direct factual tone (not
        the blank-slate persona) because the prompt asked "what is X"
        rather than "who are you".
      category: PASS
      detail: ''
  known_weak_probes:
    - prompt: "who are you?"
      problem: |
        NullClaw's default system prompt is a blank slate — the agent
        explicitly has no name and asks the user to name it. The reply
        to "who are you?" does not contain the string "nullclaw" and
        response_contains_name fails. Plumbing is correct; the probe
        is wrong for this agent.

metadata:
  recon_date: "2026-04-15"
  recon_by: main-conversation (direct source read; no Solvr helper available)
  source_citations:
    - "README.md - 678 KB binary, <2 ms startup, Zig, 50+ providers"
    - "Dockerfile - multi-stage Zig cross-compile, alpine:3.23 runtime, USER 65534"
    - "Dockerfile config stage - bakes openrouter as default provider in /nullclaw-data/config.json"
    - "Dockerfile - ENTRYPOINT [nullclaw], CMD [gateway --port 3000 --host ::]"
    - "docs/en/commands.md:32-46 - setup flow: onboard → agent -m"
    - "docs/en/commands.md:43 - `nullclaw onboard --api-key sk-... --provider openrouter` is documented non-interactive setup"
    - "docs/en/usage.md:236-246 - First-Run Flow verbatim: onboard then agent -m"
    - "build.zig.zon - version 2026.4.9, minimum_zig_version 0.15.2"

# ═══════════════════════════════════════════════════════════════════════════
# v0.2 DRAFT — persistent-mode gateway + channels (battle-proven 2026-04-17)
# ═══════════════════════════════════════════════════════════════════════════
# Canonical docs (user-provided, load-bearing — keep in sync when recipe
# is updated):
#   https://nullclaw.io/nullclaw/docs/channels
#     Channels index — 20 known keys, start-behavior rules, web-channel
#     schema example. Page explicitly points source code as canonical.
#   https://nullclaw.io/nullclaw/docs/configuration
#     Confirms `~/.nullclaw/config.json` is the config path.
#
# Upstream source-of-truth (docs site is thin on Telegram specifics):
#   https://github.com/nullclaw/nullclaw/blob/main/src/channel_catalog.zig
#     known_channels[] — telegram listener_mode = .polling, configured_message = "Telegram configured"
#   https://github.com/nullclaw/nullclaw/blob/main/src/channels/telegram.zig
#     isAuthorizedIdentity() — allow_from matches EITHER Telegram username
#     (leading @ stripped, case-insensitive) OR numeric user_id.
#     "*" = allow-all with warning. Empty list = deny all.
#   https://github.com/nullclaw/nullclaw/blob/main/src/config_types.zig
#     TelegramConfig struct — bot_token (required), allow_from (default []),
#     group_allow_from, group_policy (default "allowlist"),
#     reply_in_private (default true), proxy, interactive, streaming,
#     draft_previews, status_reactions, reaction_emojis, binding_commands_enabled,
#     topic_commands_enabled, commands_menu_mode.
#
# SCHEMA-FROM-REALITY NOTES (empirical, 2026-04-17):
#
#   a) JSON shape for the channels block is nested-by-account:
#        channels.telegram.accounts.<account_name>.{bot_token, allow_from, ...}
#      Internal Zig representation is a flat array (cfg.channels.telegram.len),
#      parser normalizes named-key dict → array with account_id=<name>.
#   b) Image ownership bug: /nullclaw-data is root:root 0755 but default
#      container user is nobody (uid 65534). `nullclaw onboard` fails with
#      KeyWriteFailed. Workaround: `docker run --user root` so writes work.
#      Long-term: have runner chown the mount.
#   c) `nullclaw onboard` BAKES a fresh config.json with empty `channels: {}`.
#      Our runner must EDIT that existing block (not append a new one — that
#      yields DuplicateField at parse time). sh-awk replace pattern used
#      below matches the first `  "channels": {` line and substitutes the
#      full block until its matching closing brace.
#   d) Ready-log signal: `info(channel_manager): telegram polling thread started`
#   e) Gateway command: `nullclaw gateway` (no flags needed; listens on :::3000
#      by default per baked config). Telegram uses polling, no public IP.

persistent:
  mode: gateway-daemon
  spec:
    entrypoint: sh
    argv:
      - -c
      - |
        set -e
        nullclaw onboard --api-key "${OPENROUTER_API_KEY}" --provider openrouter --model "openrouter/$MODEL" 2>&1 | tail -2

        CFG=/nullclaw-data/config.json

        # Replace the empty `channels: {}` block baked by onboard with our
        # channels.telegram.accounts.main entry. Must REPLACE (not append)
        # or nullclaw rejects DuplicateField.
        awk -v token="${TELEGRAM_BOT_TOKEN}" -v allow="$TELEGRAM_ALLOWED_USER" "
        BEGIN { in_ch=0; depth=0 }
        /^  \"channels\":[[:space:]]*\\{/ {
          printf \"  \\\"channels\\\": {\n    \\\"telegram\\\": {\n      \\\"accounts\\\": {\n        \\\"main\\\": {\n          \\\"account_id\\\": \\\"main\\\",\n          \\\"bot_token\\\": \\\"%s\\\",\n          \\\"allow_from\\\": [\\\"%s\\\"],\n          \\\"group_policy\\\": \\\"allowlist\\\",\n          \\\"reply_in_private\\\": true\n        }\n      }\n    }\n  }\", token, allow
          in_ch=1; depth=1
          for (i=index(\$0,\"{\")+1; i<=length(\$0); i++) {
            c=substr(\$0,i,1)
            if (c==\"{\") depth++
            else if (c==\"}\") depth--
            if (depth==0) { in_ch=0; print substr(\$0,i+1); next }
          }
          next
        }
        in_ch {
          for (i=1; i<=length(\$0); i++) {
            c=substr(\$0,i,1)
            if (c==\"{\") depth++
            else if (c==\"}\") depth--
            if (depth==0) { in_ch=0; print substr(\$0,i+1); next }
          }
          next
        }
        { print }
        " "$CFG" > "${CFG}.new" && mv "${CFG}.new" "$CFG"

        exec nullclaw gateway
    ready_log_regex: "channel_manager.*telegram polling thread started"
    health_check:
      kind: process_alive  # follow-up http probe TBD per spike-11 (nullclaw not probed that cycle)
    graceful_shutdown_s: 10
    sigterm_handled: true
    user_override: root      # required due to image ownership bug (note b)
  argv_note: |
    Three-stage bootstrap inside one container:
      (1) `nullclaw onboard --api-key $OPENROUTER_API_KEY --provider openrouter
          --model openrouter/$MODEL` — writes full config.json with the
          openrouter api_key + empty `channels: {}`.
      (2) awk replaces the `"channels": {}` block with a populated
          `channels.telegram.accounts.main` entry using env-substituted
          values for bot_token and allow_from (single user).
      (3) `exec nullclaw gateway` — foreground daemon, listens on :::3000,
          starts telegram polling thread.
    The runner substitutes $MODEL + $TELEGRAM_ALLOWED_USER before docker run;
    ${OPENROUTER_API_KEY} and ${TELEGRAM_BOT_TOKEN} expand in sh at container
    runtime via docker -e injection (unquoted heredoc).

# Phase 22b-06 — D-19..D-22 direct_interface for Gate A automation.
# Spike 06 (2026-04-18) PASS: `nullclaw agent -m "<prompt>" --model "openrouter/<model>"`
# produces the LLM reply on stdout. The --model flag is REQUIRED here even
# though `nullclaw onboard` already wrote a default — `agent -m` re-resolves
# the routing per-call; without --model nullclaw's LLM auto-route can pick
# a different model than the user expected (spike-06 §nullclaw).
# Persistent-mode coexistence: nullclaw's gateway daemon (`nullclaw gateway`)
# runs separately from the agent CLI inside the container; spike-06 caveat
# #2 documents this as plausible-but-not-empirically-proven against a
# running persistent container — Gate A test in 22b-06 is the empirical
# proof point. NB: nullclaw uses `--user root` for the persistent process
# (see persistent.spec.user_override) so docker exec inherits root, which
# is required to write the per-call session file under /nullclaw-data.
direct_interface:
  kind: docker_exec_cli
  spec:
    argv_template: ["nullclaw", "agent", "-m", "{prompt}", "--model", "openrouter/{model}"]
    timeout_s: 60
    stdout_reply: true
    exit_code_success: 0

channels:
  telegram:
    config_transport: file              # config.json (no env-var path available)
    required_user_input:
      - env: TELEGRAM_BOT_TOKEN
        secret: true
        hint: Create via @BotFather /newbot.
      - env: TELEGRAM_ALLOWED_USER
        secret: false
        kind: telegram_numeric_id_or_username    # source-confirmed: either works
        hint_url: https://t.me/userinfobot
        hint: |
          Either numeric Telegram user ID or @username (without @).
          source: src/channels/telegram.zig isAuthorizedIdentity.
    optional_user_input: []
    ready_log_regex: "channel_manager.*telegram polling thread started"
    response_routing: per_message_origin   # nullclaw replies in sender's DM
    multi_user_model: allowlist
    multi_account_supported: true       # channels.telegram.accounts.<name> nested
    # Phase 22b event_log_regex — FLAGGED. nullclaw is EXTREMELY quiet on stdout/stderr:
    # only ~13 boot lines; no per-message inbound/reply events ever hit docker logs.
    # Captured empirically in spike 01c-nullclaw (2026-04-18). The docker-logs-scrape
    # path (CONTEXT.md D-01) does not work for nullclaw — its activity lives in:
    #   (a) `nullclaw history show <session_id> --json` (via docker exec)
    #   (b) `/nullclaw-data/llm_token_usage.jsonl` (one line per LLM call)
    # See spike artifact for the 2nd-order architecture finding: D-01 needs a per-recipe
    # fallback path for recipes whose activity isn't in docker logs.
    event_log_regex:
      # FLAG: reply_sent via docker logs is NOT AVAILABLE for nullclaw.
      # Fallback observation path (declared here so planner can wire it per-recipe):
      reply_sent: null    # not observable via docker logs
      inbound_message: null    # not observable via docker logs
      agent_error: "ERROR|FATAL|panic"    # stderr-only, generic fallback
    event_source_fallback:
      kind: docker_exec_poll
      spec:
        # Poll this command every ~500ms (via docker exec); compare result to previous
        # snapshot; emit reply_sent event when a new assistant-role message appears.
        argv_template: ["nullclaw", "history", "show", "{session_id}", "--json"]
        session_id_template: "agent:main:telegram:direct:{chat_id}"
        # Alternative: tail llm_token_usage.jsonl for "something happened" signal
        tail_file: "/nullclaw-data/llm_token_usage.jsonl"
      notes: |
        nullclaw's gateway HTTP surface at 127.0.0.1:3000 only exposes /health.
        No event stream, no /messages, no /events endpoint (empirically probed
        in spike 01c — all 404). Phase 22b watcher for nullclaw uses docker exec
        polling as the observation path; not elegant, but correct.
    verified_cells:
      - date: "2026-04-17"
        bot_username: "@AgentPlayground_bot"
        allowed_user_id: 152099202
        model: openrouter/anthropic/claude-haiku-4.5
        boot_wall_s: 10
        verdict: PASS
        notes: |
          `docker run -d --user root` with OPENROUTER_API_KEY + TELEGRAM_BOT_TOKEN
          env. sh-chain: onboard → awk-edit channels block → gateway. Startup
          log shows "Gateway listening on :::3000" + "telegram polling thread
          started". User confirmed round-trip PASS ("worked perfect").
          Image-ownership bug noted in schema-from-reality (b): must run
          --user root until upstream chowns /nullclaw-data to 65534.
        category: PASS
      - date: "2026-04-18"
        bot_username: "@AgentPlayground_bot"
        allowed_user_id: 152099202
        model: anthropic/claude-haiku-4.5
        boot_wall_s: 2.46
        first_reply_wall_s: ~3
        reply_sample: "ok-nullclaw-01"
        verdict: PASS_WITH_FLAG
        notes: |
          Phase 22b spike 01c-nullclaw. Persistent /start via /v1/agents/:id/start
          with TELEGRAM_ALLOWED_USERS=152099202. User sent
          `spk01c please reply with only: ok-nullclaw-01`; nullclaw replied
          `ok-nullclaw-01` (confirmed via Telegram UI + `nullclaw history show`).
          FLAG: reply_sent is NOT observable via docker logs — only 13 boot
          lines total across stdout+stderr; nothing for per-message activity.
          Activity must be polled via `nullclaw history show <session> --json`
          or watched via /nullclaw-data/llm_token_usage.jsonl. This is a
          2nd-order finding for the 22b architecture — docker-logs-only
          watcher cannot cover nullclaw.
        category: PASS_WITH_FLAG
        spike_artifact: ".planning/phases/22b-agent-event-stream/22b-SPIKES/spike-01c-nullclaw.md"

  # ============================================================================
  # Phase 22c.3 — in-app chat channel (D-20: additive with telegram).
  # Empirically verified 2026-04-30 in Wave-0 re-validation
  # (spikes/recipe-nullclaw.md, revised v3 native A2A).
  #
  # nullclaw exposes Google's native A2A JSON-RPC 2.0 protocol on port 3000
  # path /a2a. NO sidecar, NO python3, NO apk add, NO INAPP_BOT_BIN. The
  # `nullclaw gateway` binary IS the bridge. v2's HTTP-to-CLI sidecar pattern
  # (Round 2 — runtime package install + HTTP-to-CLI bridge) was SUPERSEDED
  # by Round 3 in favor of the native A2A protocol nullclaw already
  # implements; that pattern is fully dropped from this recipe.
  #
  # Activation knobs in /nullclaw-data/config.json:
  #   gateway.allow_public_bind = true  → permit non-loopback host bind
  #   gateway.host = "0.0.0.0"          → bind all interfaces inside container
  #   gateway.require_pairing = false   → loopback-trusted; dispatcher reaches
  #                                       us only via the per-session bridge
  #                                       network (Plan 22c.3-09), never via
  #                                       the public internet — auth lives
  #                                       upstream at `require_user`
  #   a2a.enabled = true                → enables /a2a JSON-RPC + agent-card
  #   a2a.name / a2a.url / a2a.version  → identity surfaced via
  #                                       /.well-known/agent-card.json
  #                                       (protocolVersion=0.3.0)
  #
  # Contract = a2a_jsonrpc — the THIRD adapter in the dispatcher's
  # contract switch (Plan 22c.3-05), alongside openai_compat (hermes/
  # nanobot/openclaw) and zeroclaw_native (zeroclaw). Adding a 4th
  # contract is a Literal[...] extension + new match arm in the
  # dispatcher; no schema change.
  #
  # Reply parse path: $.result.artifacts[0].parts[0].text — verified
  # empirically 2026-04-30 against ap-recipe-nullclaw:latest (102-char
  # reply at this path; `result.status.state == "completed"` marks task
  # done; agent-card returns protocolVersion=0.3.0). The dispatcher's
  # a2a_jsonrpc adapter (services/inapp_dispatcher.py) hardcodes this
  # exact parse path; the response_envelope.reply_path field below is
  # documentation that mirrors the dispatcher's behavior so future
  # generic-contract paths can read it programmatically.
  # ============================================================================
  inapp:
    transport: http_localhost           # D-04: only verb in v1 (5/5 recipes uniform)
    port: 3000                          # nullclaw gateway default port (per Dockerfile ENV NULLCLAW_GATEWAY_PORT=3000)
    contract: a2a_jsonrpc               # third adapter alongside openai_compat + zeroclaw_native
    endpoint: /a2a                      # native Google A2A JSON-RPC 2.0 path
    method: POST
    auth_mode: none                     # gateway.require_pairing=false; loopback-trusted via Docker bridge net
    request_envelope:
      jsonrpc: "2.0"
      id: "{message_id}"                # api_server's inapp_messages.id substituted at dispatch time
      method: "message/send"
      params:
        message:
          role: "user"
          parts:
            - kind: "text"
              text: "{prompt}"
          messageId: "{message_id}"
    response_envelope:
      reply_path: "$.result.artifacts[0].parts[0].text"
      task_id_path: "$.result.id"
      state_path: "$.result.status.state"
    streaming:
      transport: sse
      method: "message/stream"          # POST /a2a body method=message/stream returns text/event-stream
      reply_path: "$.result.artifact.parts[0].text"
      delta_field: "append"             # boolean: append=true marks delta chunk
      done_field: "lastChunk"           # boolean: lastChunk=true marks final chunk
    health_endpoint: /health
    ready_log_regex: "Gateway listening on"
    persistent_argv_override:
      # D-20 single-channel-per-instance: when channel="inapp" is selected
      # at deploy time, the runner SWAPS the persistent.spec entrypoint
      # from `nullclaw gateway` (channels.telegram path with awk-edit of
      # config.json injecting the telegram block) to the native A2A
      # config-write below. The sh-c chain writes a fresh /nullclaw-data/
      # config.json with a2a.enabled=true + gateway.require_pairing=false
      # + the agent-card identity, chowns the dir, then execs `nullclaw
      # gateway`. NO sidecar, NO python3, NO apk add, NO INAPP_BOT_BIN.
      entrypoint: sh
      argv:
        - "-c"
        - |
          set -e
          cat > /nullclaw-data/config.json <<EOF
          {
            "agents":{"defaults":{"model":{"primary":"openrouter/$MODEL"}}},
            "models":{"providers":{"openrouter":{"api_key":"${OPENROUTER_API_KEY}","base_url":"https://openrouter.ai/api/v1"}}},
            "gateway":{"port":3000,"host":"0.0.0.0","allow_public_bind":true,"require_pairing":false},
            "a2a":{"enabled":true,"name":"${INAPP_AGENT_NAME}","description":"Phase 22c.3 inapp","url":"${INAPP_AGENT_URL}","version":"0.3.0"}
          }
          EOF
          chown -R nobody:nobody /nullclaw-data
          exec nullclaw gateway --host 0.0.0.0 --port 3000
    activation_env:
      # OPENROUTER_API_KEY is consumed at heredoc-write time by sh's
      # ${OPENROUTER_API_KEY} expansion. The runner injects
      # ${INAPP_PROVIDER_KEY} as the per-user/per-provider OpenRouter key
      # at container start time (sourced from runtime.process_env.api_key
      # mapping = OPENROUTER_API_KEY).
      OPENROUTER_API_KEY: "${INAPP_PROVIDER_KEY}"
      # ${INAPP_AGENT_NAME} + ${INAPP_AGENT_URL} populate the agent-card
      # identity surfaced at /.well-known/agent-card.json. Both are
      # recipe-template placeholders the dispatcher / runner substitutes
      # at dispatch time from the agent_instance row.
      INAPP_AGENT_NAME: "{agent_name}"
      INAPP_AGENT_URL: "{agent_url}"
    verified_cells:
      - date: "2026-04-30"
        provider: "openrouter"
        model: "anthropic/claude-haiku-4.5"
        verdict: "FULL_PASS"
        evidence: "spikes/recipe-nullclaw.md (revised v3 native A2A)"
        notes: |
          Empirical round-trips against nullclaw's native /a2a endpoint:
          - POST /a2a method=message/send → result.status.state=completed,
            result.artifacts[0].parts[0].text non-empty (102-char model
            self-identification reply against ap-recipe-nullclaw:latest).
          - POST /a2a method=message/stream → text/event-stream with chunks
            where result.append=true marks deltas and result.lastChunk=true
            marks the final chunk (capabilities.streaming=true on agent-card).
          - /.well-known/agent-card.json returns protocolVersion=0.3.0 and
            the a2a.name/url written by persistent_argv_override config.json
            (preferredTransport=JSONRPC; supportedInterfaces protocolBinding
            =JSONRPC).
