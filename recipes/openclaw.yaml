apiVersion: ap.recipe/v0.2
name: openclaw
display_name: OpenClaw
description: |
  Personal AI assistant (TypeScript, Node.js 24) — multi-channel gateway
  with messaging integrations + headless `openclaw infer` CLI. This
  recipe targets the `infer model run` local-execution path which
  bypasses the gateway entirely for stateless inference tasks.

source:
  repo: https://github.com/openclaw/openclaw
  ref: main
  ref_note: |
    OpenClaw is 2026.4.15-beta.1 at the time of recon. v0 does not pin
    to a SHA — upstream Dockerfile is stable and base images are
    SHA-pinned internally.
  upstream_version: 2026.4.15-beta.1

build:
  mode: upstream_dockerfile
  dockerfile: Dockerfile
  context: .
  notes: |
    Upstream multi-stage Dockerfile. Node 24 + Bun + pnpm + Matrix
    native crypto binding + bundled plugin workspace. Cold build is
    the long pole — expect 10–15 min minimum, can stretch on slow
    networks (Bun installer fetches from bun.sh, pnpm store is large).
    SHA-pinned base images for reproducibility. No ENTRYPOINT set;
    default CMD starts the gateway. We override by passing our own
    argv to `docker run`, which becomes the full command.

runtime:
  provider: anthropic                     # Phase 22b-07: switched from openrouter to anthropic
                                          # per known_quirks.openrouter_provider_plugin_silent_fail
                                          # (openrouter path is upstream-broken; anthropic-direct
                                          # is the empirically-verified PASS path used by smoke
                                          # verified_cells[0] + spike-01e + Spike A 2026-04-19).
  process_env:
    api_key: ANTHROPIC_API_KEY            # default for /v1/runs + tools/run_recipe.py CLI
                                          # (was OPENROUTER_API_KEY pre-22b-07; that path
                                          # silent-fails per upstream openrouter plugin bug).
    api_key_by_provider:                  # Phase 22b: per-D-21 env-var mapping for /start
      openrouter: OPENROUTER_API_KEY      # plugin bug, known-flaky — see known_quirks
      anthropic: ANTHROPIC_API_KEY        # verified working (spike 01e + Spike A)
    api_key_fallback: OPENAI_API_KEY
    base_url: null
    model: null
  volumes:
    - name: openclaw_state
      host: per_session_tmpdir
      container: /home/node/.openclaw
      mode: rw
      ephemeral: true
      owner_uid: 1000
      notes: |
        HOME=/home/node, state dir is /home/node/.openclaw. First run
        may create default config files. Ephemeral for smoke tests;
        persist for long-lived sessions (skills, memory, channels).
  warnings:
    - id: infer_is_local_path
      rule: openclaw infer model run runs LOCALLY by default and does NOT require the gateway to be running
      reason: |
        Per docs/cli/infer.md: "Stateless execution commands default to
        local. The normal local path does not require the gateway to
        be running." This is the load-bearing property that makes
        openclaw fit the v0 recipe format (which assumes single-container
        one-shot invocation). If that property ever flips, this recipe
        becomes invalid.
    - id: two_service_deployment_is_different
      rule: |
        This recipe is for HEADLESS INFER only. Full openclaw deployment
        is gateway + CLI + sandbox containers per docker-compose.yml,
        with messaging channels (WhatsApp, Telegram, Discord, etc.).
      reason: |
        Agent Playground's v0 recipe format is single-container one-shot.
        Multi-container lifecycle and long-running service model are
        out of scope until we hit the pattern on a second agent.

invoke:
  mode: cli-passthrough
  spec:
    # Phase 22b-07: REWRITTEN to anthropic-direct path.
    #
    # The Dockerfile sets no ENTRYPOINT (default CMD starts the gateway).
    # `openclaw` is symlinked into /usr/local/bin at build time. We use
    # bash -c to chain TWO commands inside a single `docker run`:
    #   1. `openclaw config set agents.defaults.model "$MODEL"` — required
    #      because /v1/runs spawns a FRESH ephemeral container with NO
    #      pre-existing openclaw.json. Without `config set`, the embedded
    #      agent runtime falls back to the baked-in default
    #      (openrouter/anthropic/claude-haiku-4-5) and routes through the
    #      upstream-broken openrouter plugin even when --model is on the
    #      CLI. (Spike A's `--model` override only worked against an
    #      ALREADY-RUNNING container previously booted by /v1/agents/:id/
    #      start which writes openclaw.json with the heredoc — that
    #      pre-config primed the anthropic plugin loader. Fresh container
    #      via /v1/runs has no such priming.)
    #   2. `openclaw infer model run --prompt ... --local --json
    #       --model "$MODEL"` — the actual inference. `--model` is also
    #      passed for defense-in-depth alignment with direct_interface
    #      (Spike A: --model is RESPECTED in this image version, not
    #      decorative as previous doc-debt claimed).
    #
    # Combined with runtime.process_env.api_key=ANTHROPIC_API_KEY (also
    # changed in 22b-07), this routes through openclaw's anthropic plugin
    # directly and bypasses the upstream-broken openrouter plugin
    # (known_quirks.openrouter_provider_plugin_silent_fail).
    #
    # Caller (smoke / /v1/runs / CLI) supplies $MODEL with a provider
    # prefix (e.g. "anthropic/claude-haiku-4-5"). The $MODEL substitution
    # happens at runner-substitute-argv time (BEFORE docker run); the
    # runner replaces $MODEL/$PROMPT inside the bash -c string literal so
    # bash sees literal values inside the double quotes.
    argv:
      - bash
      - -c
      - 'openclaw config set agents.defaults.model "$MODEL" >/dev/null && openclaw infer model run --prompt "$PROMPT" --local --json --model "$MODEL"'
    argv_note: |
      Phase 22b-07 rewrite: dropped hardcoded `openrouter/` prefix on
      `config set`; $MODEL now flows verbatim from the caller (already
      includes its own provider prefix per the v0.2 model schema, e.g.
      `anthropic/claude-haiku-4-5`). `--model "$MODEL"` is also passed
      to `infer model run` for parity with direct_interface (Spike A
      empirically PROVED --model is respected by openclaw 2026.4.15-
      beta.1 — contradicts pre-22b-07 doc-debt that called it decorative).

      Combined with runtime.process_env.api_key=ANTHROPIC_API_KEY, the
      runner injects ANTHROPIC_API_KEY=<bearer> at container boot.
      openclaw's plugin loader sees the anthropic env + the anthropic/-
      prefixed model and routes through its anthropic plugin (NOT the
      upstream-broken openrouter plugin per
      known_quirks.openrouter_provider_plugin_silent_fail).

      Runner substitution note: $PROMPT and $MODEL are replaced by the
      runner BEFORE docker run via tools/run_recipe.py::substitute_argv,
      so bash sees literal values inside the double quotes. Prompts
      containing double quotes would need escaping — v0.2 smoke prompt
      ("What is OpenClaw? Reply...") is safe.

      HISTORICAL doc-debt (preserved for context, partially contradicted):
        > `infer model run --model <x>` is empirically a decorative field;
        > the embedded agent runtime reads its lane model from
        > `agents.defaults.model` in the config, NOT from the CLI flag.
      Spike A 2026-04-19 showed --model IS respected by openclaw
      2026.4.15-beta.1 against pre-warmed containers (transcripts
      /tmp/spike-A-stdout-anthropic.txt + /tmp/spike-A-stdout-gateway.txt).
      For ephemeral fresh containers (the /v1/runs case here), the
      `config set` step is still needed to prime the plugin loader; the
      `--model` CLI flag alone is insufficient on a cold image.
    stdout_filter:
      engine: awk
      program: "{print}"  # v0 pass-through; --json is already structured
    session_id_capture:
      engine: none

smoke:
  # OpenClaw boots into a "birth conversation" on a fresh workspace — the
  # agent introspects and asks the user to give it a name, vibe, and
  # persona. A bare "who are you?" prompt therefore does NOT surface the
  # string "openclaw" in the reply (the agent is explicitly blank-slate).
  # The retroactive v0.1 sweep caught this drift vs. the original recon
  # and the probe was switched to a forcing prompt that asks the agent
  # to describe the project by name, which reliably produces a reply
  # containing "OpenClaw".
  prompt: "What is OpenClaw? Reply in one short sentence starting with 'OpenClaw is'."
  pass_if: response_contains_name
  case_insensitive: true
  timeout_s: 180
  verified_cells:
    - model: anthropic/claude-haiku-4.5
      verdict: PASS
      notes: |
        Forcing prompt "What is OpenClaw? Reply..." yields a single clean
        output such as "OpenClaw is an open-source personal AI assistant
        framework that runs locally and integrates with messaging
        platforms, web browsers, and device controls."
        response_contains_name passes on the agent's own project-name
        self-identification.
      wall_time_s: 62.25
      category: PASS
      detail: ''
  known_weak_probes:
    - prompt: "who are you?"
      problem: |
        OpenClaw boots into a birth-conversation introspection flow on a
        fresh workspace — the agent explicitly has no name yet and asks
        the user what it should be called. The reply never contains
        "openclaw" and response_contains_name fails. Plumbing is correct;
        the probe is wrong for this agent. Use a forcing prompt like
        "What is OpenClaw? Reply in one short sentence starting with
        'OpenClaw is'." instead.
  known_incompatible_cells:
    - model: openai/gpt-4o-mini
      verdict: FAIL
      notes: |
        Agent loop exits with `attempts: []` and "⚠️ Agent couldn't
        generate a response". Config is correct, auth is correct,
        provider routes to openrouter, but the embedded agent runtime's
        turn dispatch stops without emitting any payload. Likely
        model-specific incompatibility with openclaw's tool-use
        contract or system-prompt shape. Not a recipe bug. Claude
        models via openrouter work fine.

      category: ASSERT_FAIL
      detail: "Agent loop exits with `attempts: []` and \"⚠️ Agent couldn't\ngenerate a response\""
metadata:
  recon_date: "2026-04-15"
  recon_by: main-conversation (direct source read; Solvr rooms for openclaw probed — none available)
  source_citations:
    - docs/cli/infer.md:14 - "openclaw infer is the canonical headless surface"
    - docs/cli/infer.md:131 - "The normal local path does not require the gateway to be running"
    - docs/cli/infer.md:138 - verbatim example "openclaw infer model run --prompt ... --json"
    - Dockerfile (tail) - CMD ["node", "openclaw.mjs", "gateway", "--allow-unconfigured"] (no ENTRYPOINT)
    - Dockerfile (tail) - ln -sf /app/openclaw.mjs /usr/local/bin/openclaw (openclaw in PATH)
    - Dockerfile - USER node (uid 1000)
    - "package.json - bin.openclaw points to openclaw.mjs, version 2026.4.15-beta.1"
    - .env.example - OPENROUTER_API_KEY listed under "Model provider API keys"
    - docker-compose.yml - confirms two-service deployment (gateway + cli) for full runtime

# ═══════════════════════════════════════════════════════════════════════════
# v0.2 DRAFT — persistent-mode gateway + channels (WIP, 2026-04-17)
# ═══════════════════════════════════════════════════════════════════════════
# Canonical docs (user-provided, load-bearing — keep in sync when recipe
# is updated):
#   https://docs.openclaw.ai/cli/channels
#     `openclaw channels` CLI surface — list/status/add/remove/login/logout/
#     logs/capabilities/resolve. CRITICAL note from docs: "Telegram does NOT
#     use `openclaw channels login telegram`; configure token in config/env,
#     then start gateway." So for Telegram we write config directly.
#   https://docs.openclaw.ai/channels/telegram.md
#     Telegram-specific reference. Config lives in ~/.openclaw/openclaw.json5.
#     Schema: channels.telegram.{enabled, botToken, dmPolicy, allowFrom,
#     groupPolicy, groupAllowFrom, groups, accounts}.
#     dmPolicy enum: pairing | allowlist | open | disabled.
#     Env fallback: TELEGRAM_BOT_TOKEN=... (default account only).
#   https://docs.openclaw.ai/cli/gateway.md
#     `openclaw gateway` / `openclaw gateway run` — foreground PID 1 friendly.
#     Default port 18789 loopback; beyond loopback without auth blocked.
#     Flags: --port, --bind, --auth, --token, --allow-unconfigured, --dev,
#     --force, --verbose.
#   https://docs.openclaw.ai/help/environment.md
#     Full env var reference. OPENCLAW_HOME, OPENCLAW_STATE_DIR,
#     OPENCLAW_CONFIG_PATH, OPENCLAW_LOG_LEVEL, OPENCLAW_LOAD_SHELL_ENV.
#   https://docs.openclaw.ai/channels
#     Channels index — 20+ platforms, concurrent routing, "DM pairing
#     and allowlists are enforced for safety" at gateway level.
#   https://docs.openclaw.ai/gateway/configuration-reference
#     Canonical config shape. agents.defaults.model.primary accepts
#     either string or {primary, fallbacks} object. models.<provider/
#     model>.{alias, params} is the per-model config block.
#   https://docs.openclaw.ai/gateway/troubleshooting.md
#     Troubleshooting guide — "incomplete turn" / "payloads=0" NOT
#     documented here (bug is undocumented upstream).
#   https://docs.openclaw.ai/concepts/agent-loop.md
#     Agent loop internals. "0 payloads occurs when no renderable
#     payloads remain AND a tool errored" — confirms the turn fails
#     because a tool call or memory lookup errored silently.
#   https://docs.openclaw.ai/llms.txt
#     Docs sitemap (index of all .md pages).
#
# KEY FACTS (canonical):
#   - schema root: `channels.telegram.{botToken, dmPolicy, allowFrom, ...}`
#   - field names: camelCase (botToken NOT bot_token)
#   - dmPolicy = "allowlist" required for our non-interactive flow (NOT "pairing")
#   - allowFrom: array of numeric Telegram user IDs
#   - Run: `openclaw gateway` or `openclaw gateway run`
#
# Battle-proven 2026-04-17: CHANNEL_PASS (wiring end-to-end confirmed)
# with an UPSTREAM KNOWN BUG on the agent loop (all models tested).
#
# SCHEMA-FROM-REALITY NOTES (empirical, 2026-04-17):
#
#   a) Runtime reads `~/.openclaw/openclaw.json`, NOT `openclaw.json5`. If
#      the runner writes only to .json5, openclaw CREATES a fresh empty
#      .json ignoring the .json5 contents. Canonical path is the .json.
#      (Source .json5 only matters if you pre-feed openclaw via a different
#      code path we didn't hit.) The runner MUST write .json directly.
#   b) `allowFrom` entries need the `"tg:"` prefix for numeric Telegram IDs
#      — e.g. ["tg:152099202"] (NOT ["152099202"]). Empirically confirmed:
#      without the prefix, openclaw falls back to pairing mode even with
#      dmPolicy=allowlist and issues a pairing code instead of authorizing.
#   c) `agents.defaults.model.primary` is the canonical path; value is
#      `"openrouter/<model>"` (slashed). openclaw auto-enables the openrouter
#      plugin when it sees a model prefixed with `openrouter/`.
#      OPENROUTER_API_KEY env var is the documented fallback (not embedded
#      in the config file needed).
#   d) `--allow-unconfigured` flag required — without it openclaw rejects
#      non-local `gateway.mode` and exits. Docs: cli/gateway.md.
#   e) UPSTREAM BUG — openclaw's @agent/embedded module produces 0 payloads
#      on every gateway+telegram+model combo we tested (haiku-4.5, sonnet-4.5).
#      Log: `[agent/embedded] incomplete turn detected ... stopReason=stop
#      payloads=0 — surfacing error to user`. Openclaw recovers gracefully
#      and sends a visible "⚠️ Agent couldn't generate a response. Please
#      try again." to the user — so the CHANNEL round-trip is empirically
#      confirmed (provider started → inbound received → agent called →
#      outbound sendMessage ok), but the AGENT LOOP is broken upstream in
#      gateway mode. Tracked as an upstream issue in openclaw_known_quirks.
#      The `infer model run --local` path (the one-shot recipe) does NOT
#      hit this bug — it bypasses the embedded agent entirely.

persistent:
  mode: gateway-daemon
  spec:
    entrypoint: sh
    argv:
      - -c
      - |
        set -e
        mkdir -p /home/node/.openclaw
        cat > /home/node/.openclaw/openclaw.json <<EOF
        {
          "channels": {
            "telegram": {
              "enabled": true,
              "botToken": "${TELEGRAM_BOT_TOKEN}",
              "dmPolicy": "allowlist",
              "allowFrom": ["tg:$TELEGRAM_ALLOWED_USER"]
            }
          },
          "agents": {
            "defaults": {
              "model": {
                "primary": "openrouter/$MODEL"
              }
            }
          }
        }
        EOF
        rm -f /home/node/.openclaw/openclaw.json5
        exec openclaw gateway --allow-unconfigured
    ready_log_regex: "\\[telegram\\] \\[default\\] starting provider"
    health_check:
      kind: http
      port: 18789
      path: /
    graceful_shutdown_s: 5       # per spike-07 (openclaw takes 45-75s to boot but SIGTERM drain is ~5s)
    sigterm_handled: true
  argv_note: |
    Two-stage bootstrap: (1) write openclaw.json with channels.telegram
    (dmPolicy="allowlist" + allowFrom with "tg:" prefix) + agents.defaults.
    model.primary=openrouter/$MODEL, (2) remove any leftover .json5 so the
    runtime doesn't try to reconcile, (3) exec `openclaw gateway
    --allow-unconfigured` foreground. Boot wall 45-75s (plugin loading +
    config migrations). OPENROUTER_API_KEY env var is inherited as the
    openrouter fallback.

# Phase 22b-07 — Gap 1 closure: openclaw direct_interface uses docker_exec_cli
# pointed at `openclaw infer model run --local --json` instead of the previous
# port-18000 http_chat_completions path. Reasoning:
#   1. The persistent gateway started by /v1/agents/:id/start (entrypoint
#      `openclaw gateway --allow-unconfigured`) exposes ONLY the channel-router
#      on port 18789 (verified by spike-01e + health_check.port:18789 above).
#      Port 18000 belongs to `openclaw serve` — a separate process we do NOT
#      start. The previous declaration was a dead reference to MSV's
#      forward_to_agent.go pattern that never matched our container topology.
#   2. The persistent /start handler ALREADY:
#        (a) injects ANTHROPIC_API_KEY when model startswith "anthropic/"
#            (per recipe.runtime.process_env.api_key_by_provider:anthropic above
#             + agent_lifecycle._resolve_api_key_var dispatch);
#        (b) writes ~/.openclaw/openclaw.json directly via heredoc (NOT via a
#            `config set` command — see persistent.spec.argv lines 261-287
#            above) with `agents.defaults.model.primary = openrouter/$MODEL`,
#            dmPolicy=allowlist, allowFrom=[tg:$TELEGRAM_ALLOWED_USER].
#      Spike A 2026-04-19 PROVED that an even simpler path works: the
#      `--model {model}` CLI flag on `infer model run` is RESPECTED and
#      OVERRIDES the openclaw.json `agents.defaults.model` setting at
#      invocation time — without mutating any in-container state. So
#      direct_interface drops the `config set` step entirely and just passes
#      the anthropic model on the CLI. (The recipe's `invoke.spec.argv_note`
#      claiming `--model` is "decorative" is doc-debt — empirically false
#      for openclaw 2026.4.15-beta.1 with `infer model run`. Flagged in
#      objective for future doc-fix.)
#   3. `infer model run --local` bypasses both the gateway and the
#      embedded-agent path that breaks with the openrouter provider plugin
#      (known_quirks.openrouter_provider_plugin_silent_fail below). With
#      ANTHROPIC_API_KEY, this is the verified-PASS code path used by:
#        (a) smoke verified_cells[0] (recipes/openclaw.yaml line 127, verdict=PASS)
#        (b) spike-01e direct docker run (verified_cells[1] PASS_WITH_FLAG line 545)
#        (c) spike-06 /v1/runs invocation (spike-06-direct-interface.md line 33)
#   4. We embed the {prompt} via a `--prompt` flag literal; openclaw is
#      documented to support arbitrary text after `--prompt`. The harness
#      passes the prompt as a single argv element (subprocess shell=False) so
#      whitespace/quoting is safe even with the agent_harness "Please reply
#      with exactly this text..." prompt envelope.
#   5. reply_extract_regex pulls the assistant text out of the JSON envelope
#      (`outputs[0]` per `--json` schema). Because the harness verdict checks
#      for the correlation substring `ok-openclaw-<4-hex>` ANYWHERE in
#      reply_text (Python `in` operator), even unparsed JSON would PASS as long
#      as the model echoed the prompt — but stripping to the assistant text
#      keeps the reply_text field clean for SUMMARY artifacts.
direct_interface:
  kind: docker_exec_cli
  spec:
    # Spike A 2026-04-19 PROVED: the `--model {model}` flag is MANDATORY.
    # Without it, infer model run hits FailoverError("No API key found
    # for provider 'openrouter'") because the gateway-baked openclaw.json
    # defaults agents.defaults.model to `openrouter/anthropic/claude-haiku-4-5`
    # and only ANTHROPIC_API_KEY is in env. The CLI flag overrides the
    # config-file default — openclaw 2026.4.15-beta.1 IS responsive to it
    # (contradicting the recipe's `invoke.spec.argv_note` doc-debt at lines
    # 91-106 which claims --model is "decorative"; flagged in objective).
    #
    # Direct argv form (NO sh-chain needed). Previous version sh-chained a
    # `config set` step to override the openrouter prefix; Spike A showed
    # that's redundant — `--model` on the CLI achieves the same end-effect
    # without mutating openclaw.json state inside the container.
    #
    # Optional perf knob: replacing `--local` with `--gateway` cut Spike A
    # wall time from 84s to 42s (gateway warm-reuse). Plan defaults to
    # `--local` for explicitness (no shared-state coupling between Gate A
    # invocations); orchestrator may flip to `--gateway` if Gate B latency
    # budget pressure surfaces. Both PASS empirically.
    argv_template:
      - openclaw
      - infer
      - model
      - run
      - --prompt
      - "{prompt}"
      - --local
      - --json
      - --model
      - "{model}"
    timeout_s: 120             # Spike A measured 84s for --local cold model; live Gate A run 2026-04-19 saw r1 hit 90s exactly (subprocess timeout) before r2/r3 settled at 80-84s. Bump to 120s for cold-start variance headroom. (--gateway path is 42s and would tolerate timeout_s: 60.)
    stdout_reply: true
    # Pull the assistant text out of the --json envelope. The envelope shape
    # per Spike A live transcripts (/tmp/spike-A-stdout-anthropic.txt) is:
    #   {"ok":true,"capability":"model.run","transport":"local",
    #    "provider":"anthropic","model":"claude-haiku-4-5","attempts":[],
    #    "outputs":[{"text":"<assistant text>","mediaUrl":null}]}
    # NOTE: outputs[0] is an OBJECT not a string. The regex captures the
    # inner `text` field directly (the FIRST occurrence of `"text":"..."` in
    # stdout — there is exactly one in the response shape). If the harness
    # verdict check (substring `ok-{recipe}-{corr}`) finds the correlation
    # id even when extraction misses, the test still PASSES — defense in
    # depth.
    reply_extract_regex: "(?s)\"text\"\\s*:\\s*\"(?P<reply>[^\"]*)\""
    exit_code_success: 0

channels:
  telegram:
    config_transport: file              # openclaw.json (NOT .json5)
    required_user_input:
      - env: TELEGRAM_BOT_TOKEN
        secret: true
        hint: Create via @BotFather /newbot.
      - env: TELEGRAM_ALLOWED_USER
        secret: false
        kind: telegram_numeric_id
        prefix_required: "tg:"          # runner must auto-prefix the value in allowFrom
        hint_url: https://t.me/userinfobot
        hint: Numeric Telegram user ID (no @). Runner auto-prefixes "tg:".
    optional_user_input: []
    ready_log_regex: "\\[telegram\\] \\[default\\] starting provider"
    response_routing: per_message_origin
    multi_user_model: allowlist
    multi_account_supported: true
    # Phase 22-05: pairing approve CLI drives POST /v1/agents/:id/channels/telegram/pair.
    # Runner substitutes $CODE with the user-supplied 4-char Telegram pairing
    # code at docker-exec time. openclaw's `pairing approve` CLI cold-boots
    # the full plugin registry per invocation (~60s wall per spike-10) so
    # the API-side timeout is 90s.
    pairing:
      approve_argv: [openclaw, pairing, approve, telegram, "$CODE"]
    # Phase 22b event_log_regex — FLAGGED. openclaw logs only boot+lifecycle events
    # to docker stdout + its file log (/tmp/openclaw/openclaw-2026-04-18.log). Per-message
    # activity (inbound user messages, outbound assistant replies) is NOT in either log.
    # It lives in the session JSONL: /home/node/.openclaw/agents/main/sessions/<session_id>.jsonl
    # Captured empirically in spike-01e-openclaw (2026-04-18) via direct docker run with
    # ANTHROPIC_API_KEY env + dmPolicy=allowlist + allowFrom=["*"] wildcard.
    event_log_regex:
      reply_sent: null           # not observable via docker logs
      inbound_message: null      # not observable via docker logs
      agent_error: "(?:\"logLevelName\":\"(?:ERROR|FATAL)\")"   # JSON-line format
    event_source_fallback:
      kind: file_tail_in_container
      spec:
        # Session metadata resolves the per-chat session_id:
        sessions_manifest: /home/node/.openclaw/agents/main/sessions/sessions.json
        # Per-session JSONL — one line per turn event. role=message entries carry
        # {role: user|assistant, content: [{type: text, text: "..."}]}. Watcher parses
        # each appended line; when role=assistant + content[].type=text appears,
        # emit reply_sent event with text as reply body.
        session_log_template: "/home/node/.openclaw/agents/main/sessions/{session_id}.jsonl"
        # Cross-reference by session_id key in sessions.json:
        #   sessions.json["agent:main:main"].sessionId → <uuid>
        #   sessions.json["agent:main:main"].origin.from → "telegram:<chat_id>"
      notes: |
        openclaw's session JSONL is authoritative. Each message-turn is a JSON line;
        role=assistant content[type=text].text IS the full reply body, including
        any correlation id the user sent (verified empirically — "ok-openclaw-01"
        was captured 2× in the file: user ping + bot echo).

        Watcher design: `docker exec <cid> tail -f /home/node/.openclaw/agents/main/sessions/<session_id>.jsonl`
        with a JSON parser on each line. chat_id resolved from sessions.json origin.from.
        Compare to nullclaw's event_source_fallback which uses a CLI-poll path instead —
        both are valid `file_tail_in_container` / `docker_exec_poll` fallback kinds that
        the log-watcher service must support (see CONTEXT.md D-23 proposal).
    known_quirks:
      - id: openrouter_provider_plugin_silent_fail
        severity: blocks_llm_reply_with_openrouter
        description: |
          ROOT CAUSE ISOLATED 2026-04-18 (via user-suggested Anthropic-
          direct isolation test): openclaw's openrouter provider plugin
          in this image version (2026.4.15-beta.1) silently aborts LLM
          calls pre-flight. Every call returns `attempts: []` with
          `content:[]` and `usage: all zero`, producing the canonical
          "⚠️ Agent couldn't generate a response" message.

          ISOLATION EVIDENCE:
          - `openclaw models status` shows `Auth: yes` + env-var key
            correctly detected: `source=env: OPENROUTER_API_KEY`
          - Direct OpenRouter API call with same key WORKS: returns
            "Hey there friend" + usage tokens (curl test passed)
          - `openclaw config set agents.defaults.model "anthropic/
            claude-haiku-4-5"` with ANTHROPIC_API_KEY env → agent
            loop PRODUCES text, channel round-trip PASSES end-to-end
          - Same recipe pattern with openrouter/ prefix + OPENROUTER_
            API_KEY → `attempts: []` silent fail
          - Isolated across: agent CLI, infer model run --local,
            gateway+channel — all fail with openrouter; all work
            with anthropic direct
          - NOT a channel-layer bug (proven: Telegram wiring is OK)
          - NOT an agent-embedded bug (proven: loop works with
            anthropic)
          - NOT an auth-registration bug (Auth: yes, config set
            accepted, env detected)
          - IS an openrouter-plugin-only bug — the call never leaves
            the container

          WORKAROUND: use direct provider keys (ANTHROPIC_API_KEY,
          OPENAI_API_KEY, etc.) instead of OPENROUTER_API_KEY. This
          bypasses the broken openrouter plugin entirely. openclaw
          supports all these as first-class providers.

          IMPACT ON PLATFORM (Agent Playground):
          - Our BYOK flow defaults to OpenRouter. Openclaw is the
            ONLY recipe of 5 where this matters — the other 4 all
            work with OpenRouter through the same key.
          - Phase 22a channel shipping decision: openclaw recipe
            must declare provider: anthropic (or openai, etc.), and
            the deploy form must collect the direct-provider key for
            openclaw sessions instead of the shared OpenRouter key.
          - OR: recipe marks openclaw as "requires direct provider
            key" and deploy UI gates it behind a separate key input.

          HYPOTHESIS (needs upstream confirmation): openclaw v2026.4.15-
            beta.1 openrouter plugin either:
          - reads an auth field that env-only path doesn't populate
            (needs interactive `openclaw models auth login --provider
            openrouter --method api-key` which requires TTY), or
          - has a regression specifically in its openrouter HTTP
            request layer that silently aborts.

          ACTION: file upstream issue against github.com/openclaw/
          openclaw with the isolation evidence above. Until then, the
          recipe's OpenRouter path is NOT usable in non-interactive
          containers.

          Previous (incorrect) diagnosis left here for history:
          > Claimed "0 payloads occurs when no renderable payloads
          > remain AND a tool errored" (from docs/concepts/agent-
          > loop.md). Disabling memorySearch, workspace pre-seeding,
          > pairing approve — ALL tried, NONE fixed. Reason none
          > fixed: tool_error narrative is wrong; ACTUAL cause is
          > that the openrouter plugin aborts pre-flight so no LLM
          > call ever happens, and the agent loop correctly surfaces
          > "0 payloads" as a consequence (the turn did have a
          > failure — just the failure was at the provider HTTP call
          > layer, invisible to logs). Disabling
          another tool error path still firing.

          Models tested (all reproduce): anthropic/claude-haiku-4.5,
          anthropic/claude-sonnet-4.5 (both via openrouter/).
          One-shot via `openclaw infer model run --local` does NOT hit
          this bug — different code path that bypasses @agent/embedded.

          2026-04-18 DEEPER ROOT CAUSE FOUND: the session jsonl dump
          revealed the LLM call itself returns empty
          (content:[] usage.input:0 usage.output:0 totalTokens:0
          stopReason:stop). Every model call via openrouter returns
          a 0-token empty completion. This is NOT a tool error —
          it's openclaw's HTTP call to OpenRouter that silently gets
          no response body. Reproduced with both gpt-4o-mini AND
          sonnet-4.5 (different model families). `openclaw models
          status` shows `Auth: yes` and `source=env:OPENROUTER_API_KEY`,
          so env-var fallback is RECOGNIZED — but the actual API call
          returns nothing. Likely openclaw's openrouter provider plugin
          requires interactive `openclaw models auth login --provider
          openrouter --method api-key` to populate
          `auth-profiles.json`, and the env-var path skips a
          required initialization step.

          `openclaw models auth login` REQUIRES interactive TTY
          ("Error: models auth login requires an interactive TTY.")
          so it cannot run in our recipe's non-interactive sh-chain
          pattern. This makes openclaw FUNDAMENTALLY INCOMPATIBLE
          with the Agent Playground recipe contract for persistent
          channel mode.

          Workaround options for Phase 22 (updated):
          (1) Pre-bake `auth-profiles.json` at build time into the
              image — would require reverse-engineering the file
              format and hard-coding a dev OpenRouter key into the
              image, which breaks BYOK;
          (2) Switch openclaw recipe to use `openclaw infer model run
              --local` (the one-shot path that DOES work with env
              vars) + write a custom Python Telegram bridge that
              proxies msgs → infer subprocess → sendMessage reply.
              Out of scope for v0.2 channels schema — it means
              openclaw gets its own bridge, not the generic gateway
              pattern;
          (3) EXCLUDE openclaw from v0.2 channels rollout. Keep the
              one-shot recipe as-is (which works). Revisit when
              openclaw ships a non-interactive `auth login --api-key`
              flag, OR when we implement option (2).

          RECOMMENDATION: option (3) for v0.2. Ship the other 4
          recipes (hermes, picoclaw, nullclaw, nanobot) with full
          channel support; mark openclaw's channels block as
          `unsupported_in_persistent_mode: true` + keep verified_cells
          empty; re-enable after upstream fix OR custom bridge.
    provider_compat:
