apiVersion: ap.recipe/v0.2
name: hermes
display_name: Hermes Agent
description: |
  Self-improving AI agent by Nous Research. Full TUI with slash-commands,
  skills system, multi-provider model support, messaging gateways.
  This recipe covers the non-interactive one-shot path for Agent Playground —
  a single prompt in, a single reply out, via a throwaway container.

source:
  repo: https://github.com/NousResearch/hermes-agent
  ref: 19142810edfd2d3dbe947692732b868d57b9a18e
  ref_note: main branch head at recon date, pinned for reproducibility
  upstream_version: v0.9.0 / 2026.4.13

build:
  mode: upstream_dockerfile
  dockerfile: Dockerfile
  context: .
  observed:
    image_size_gb: 5.19
    wall_time_s: 451
    host_os: darwin 25.3.0 arm64
  notes: |
    Upstream multi-stage Dockerfile (uv + gosu + debian:13.4). Installs
    .[all] Python extra + Playwright chromium + WhatsApp bridge Node deps.
    Heavier than a typical agent — budget ~5.5 GB per image when planning disk.
    No build flags needed. No .dockerignore traps observed.
    Cold-build time is the long pole; warm apt/layer cache can halve it.

runtime:
  provider: openrouter
  process_env:
    api_key: OPENROUTER_API_KEY
    api_key_fallback: OPENAI_API_KEY  # runtime_provider.py:463
    base_url: null                    # hermes defaults to https://openrouter.ai/api/v1
    model: null                       # set per-call via --model / -m flag
  volumes:
    - name: hermes_home
      host: per_session_tmpdir
      container: /opt/data
      mode: rw
      ephemeral: true
      owner_uid: 10000
      notes: |
        HERMES_HOME. Entrypoint chowns this to UID 10000 on startup
        ("Dropping root privileges" pattern). First run copies config
        templates (.env.example → .env, cli-config.yaml.example → config.yaml)
        and runs skills_sync.py (~79 bundled skills, ~1-2s on cold mount).
        Set ephemeral=true for per-session isolation; persist across
        restarts if you want to skip the skill-sync cost on warm starts.
  warnings:
    - id: no_touch_env_file
      rule: Do NOT write to /opt/data/.env
      reason: |
        hermes_cli/env_loader.py:86-88 loads $HERMES_HOME/.env with
        override=True. Any key written there (even an empty value)
        silently clobbers the same key in process env. Pass credentials
        exclusively via `docker run -e`. Let the entrypoint bootstrap
        .env from .env.example (which ships with all keys commented out,
        so process env wins).
    - id: no_override_playwright_path
      rule: Do NOT override PLAYWRIGHT_BROWSERS_PATH at runtime
      reason: |
        Baked to /opt/hermes/.playwright at build time so the install
        survives the /opt/data volume overlay. Overriding at runtime
        loses the cached chromium and breaks any skill that uses
        browser tools.
    - id: chatty_preamble
      rule: Expect ~83 lines of skill-sync stdout noise per cold start
      reason: |
        Even with `-Q` (quiet), the entrypoint prints "Dropping root
        privileges" + the full 79-skill bundle sync + "Done: N new, 0
        updated, 0 unchanged" BEFORE the hermes process gets the query.
        This is pre-hermes entrypoint output, not a -Q bug. Strip it in
        the stdout_filter (see invoke.spec below).

invoke:
  mode: cli-passthrough
  spec:
    # Upstream entrypoint ends with `exec hermes "$@"`, so `docker run`
    # trailing args become `hermes <subcommand> <flags>` directly.
    argv:
      - chat
      - -q
      - $PROMPT
      - -Q
      - --provider
      - openrouter
      - -m
      - $MODEL
      - --yolo
      - --max-turns
      - "30"
      - --source
      - tool
      - --verbose
    argv_note: |
      --yolo: skip interactive approval prompts. Safe because the container
              is the approval boundary in Agent Playground's isolation model.
      --max-turns 30: bound the tool-calling loop. Default is 90 which is
              fine for real sessions but wasteful for smoke tests.
      --source tool: tag the session so it doesn't pollute the user's
              session list in the TUI.
      --verbose: surfaces upstream LLM errors (401/402/429/5xx) on stderr.
              Without this, hermes's `run_agent` + `root` loggers are
              suppressed, making every upstream failure look identical:
              exit 1, empty stderr, stdout cut at `session_id:`. See debug
              session `.planning/debug/hermes-invoke-fail-silent-stderr.md`.
    stdout_filter:
      engine: awk
      program: |
        BEGIN{p=0}
        /^Done: [0-9]+ new/{p=1; next}
        p && /^session_id:/{exit}
        p && /^[╭│╰]/{next}
        p {print}
      notes: |
        Cuts at the "Done: <N> new" skill-sync terminator to skip the
        83-line preamble, then captures until "session_id:", stripping
        Rich panel box-drawing chars (╭│╰) inside the window.
        Known quirk: some models (e.g. claude-haiku-4.5) emit the reply
        TWICE — once inside a Rich panel with 4-space indent, once as
        plain text immediately after. This filter preserves both; the
        consumer should dedupe if a single copy is required. Shorter
        replies (gpt-4o-mini, gemini) emit once.
    session_id_capture:
      engine: awk
      program: "/^session_id:/ {print $2}"
      notes: Session ID can be passed to `-r SESSION_ID` to resume.

smoke:
  prompt: "who are you?"
  pass_if: response_contains_name
  case_insensitive: true
  timeout_s: 60
  verified_cells:
    - model: anthropic/claude-haiku-4.5
      verdict: PASS
      wall_time_s: 12.86
      notes: Adopts persona cleanly. Response duplicated in stdout (Rich + plain).
      category: PASS
      detail: ''
    - model: openai/gpt-4o-mini
      verdict: PASS
      wall_time_s: 12.69
      notes: Adopts persona cleanly. Single-copy output.
      category: PASS
      detail: ''
  known_incompatible_cells:
    - model: google/gemini-2.5-flash
      verdict: FAIL
      notes: |
        Initial recon (2026-04-15) observed a deterministic FAIL:
        "I am a large language model, trained by Google." Plumbing
        was correct — container ran clean, exit 0, reached OpenRouter,
        received a completion — but the model refused to adopt the
        Hermes persona. The v0.1 retroactive sweep showed the cell
        flipping between PASS and FAIL across runs with no other
        change, so it is NOT a stable regression probe. Removed from
        verified_cells[] to keep the --all-cells gate deterministic.
        Documented here as a model-compatibility finding: gemini-2.5-flash
        does not reliably adopt the Hermes persona, so consumers that
        care about persona cohesion should not pick it.

      category: ASSERT_FAIL
      detail: flapping verdict — see notes
metadata:
  recon_date: "2026-04-15"
  recon_by: agent-playground-recon (subagent) + clawdbot-hermes-helper (Solvr)
  source_citations:
    - hermes_cli/auth.py:371-374 - _resolve_api_key_provider_secret reads process env
    - hermes_cli/runtime_provider.py:463-469 - OpenRouter api_key candidate list
    - hermes_cli/runtime_provider.py:221 - HERMES_INFERENCE_PROVIDER env read
    - hermes_cli/env_loader.py:86-88 - $HERMES_HOME/.env load with override=True
    - docker/entrypoint.sh - gosu UID remap + template bootstrap + exec hermes

# ═══════════════════════════════════════════════════════════════════════════
# v0.2 DRAFT — persistent-mode gateway + multi-channel (hermes only, 2026-04-17)
# ═══════════════════════════════════════════════════════════════════════════
#
# Canonical docs (user-provided, load-bearing — keep in sync when recipe
# is updated):
#   https://hermes-agent.nousresearch.com/docs/user-guide/messaging
#     Messaging gateway overview — Telegram/Discord/Slack/WhatsApp/Signal/CLI
#     in one process; env-var-driven config story.
#   https://hermes-agent.nousresearch.com/docs/user-guide/messaging/telegram
#     Telegram setup — TELEGRAM_BOT_TOKEN / TELEGRAM_ALLOWED_USERS /
#     TELEGRAM_HOME_CHANNEL env vars; per-user DM routing.
#   https://hermes-agent.nousresearch.com/docs/guides/team-telegram-assistant
#     Multi-user team setup — static allowlist vs DM pairing alternatives.
#   https://hermes-agent.nousresearch.com/docs/guides/tips
#     Operational tips — no container-specific hot topic; uses docker as
#     sandbox for `exec` tool; GATEWAY_ALLOW_ALL_USERS danger.
#   https://hermes-agent.nousresearch.com/docs/getting-started/installation
#     Install story — `messaging` extra lists Telegram/Discord/Slack;
#     WhatsApp needs Node dep.
#   https://hermes-agent.nousresearch.com/docs/guides/python-library
#     Python API surface — not in scope for recipe but noted for provider-
#     agnostic chat parameter (`platform: "telegram"`).
#
# The blocks below are ap.recipe/v0.2-candidate additions. The schema is NOT
# frozen yet — it will be finalized after empirical PASS on all 5 committed
# recipes (picoclaw/nullclaw/nanobot/openclaw pending). Until then these
# blocks are hermes-specific and recipe-loader safe (additive fields; the
# v0.1 RecipeSummary projection ignores unknown top-level keys).
#
# Runner code (tools/run_recipe.py) does not yet read `persistent:` or
# `channels:`. Phase 22b work will wire them. For now these blocks are the
# DECLARATION of what hermes supports; empirical evidence is captured under
# `channels.telegram.verified_cells[]`.

persistent:
  mode: gateway-daemon
  spec:
    argv:
      - gateway
      - run
      - -v
    # Regex matched against stderr to confirm the daemon is past the LLM/TLS
    # handshake and actively listening for inbound messages. Hermes emits
    # exactly one `connected` line per channel that attached.
    ready_log_regex: "gateway\\.run: ✓ (\\w+) connected"
    health_check:
      kind: process_alive
    graceful_shutdown_s: 15
    sigterm_handled: true
  argv_note: |
    `hermes gateway run -v` is the non-interactive persistent daemon. A
    single gateway process hosts every channel whose env vars are set
    (confirmed by upstream docs and by the boot log `Gateway running with N
    platform(s)` where N is the count of detected channels). -v elevates
    stderr to the same verbosity as the one-shot fix from
    `.planning/debug/hermes-invoke-fail-silent-stderr.md` — any upstream
    failure (LLM 4xx, Telegram API timeout, etc.) surfaces on stderr.
  lifecycle_note: |
    docker run -d ap-recipe-hermes:latest gateway run -v
    — image entrypoint still gosu-remaps the uid + execs `hermes "$@"`, so
    the bare `gateway run -v` becomes `hermes gateway run -v` at PID 1
    (inside the gosu-dropped user). Container-exit-zero on SIGTERM after
    ~5s graceful (telegram.ext.Application shutdown hook).

channels:
  telegram:
    # Transport: env-var only. No config file edit. The `.env` override
    # path (~/.hermes/.env) exists as an alternative — the runner injects
    # the vars at docker run time instead, which is simpler and keeps
    # per-user secrets out of the container filesystem.
    config_transport: env
    required_user_input:
      - env: TELEGRAM_BOT_TOKEN
        secret: true
        hint: Create the bot via @BotFather /newbot, copy the HTTP API token.
      - env: TELEGRAM_ALLOWED_USERS
        secret: false
        kind: telegram_numeric_id_csv
        hint_url: https://t.me/userinfobot
        hint: |
          Comma-separated numeric Telegram user IDs (NOT @usernames).
          Get yours by DM'ing @userinfobot and reading the `Id:` line.
    optional_user_input:
      - env: TELEGRAM_HOME_CHANNEL
        hint: |
          Numeric chat ID where cron jobs and proactive messages are
          delivered. Negative for group/supergroup chats, positive for DMs.
      - env: TELEGRAM_HOME_CHANNEL_NAME
        hint: Display name of the home channel — cosmetic only.
    ready_log_regex: "\\[Telegram\\] Connected to Telegram \\(polling mode\\)"
    response_routing: per_message_origin   # bot replies in the chat the sender messaged from
    multi_user_model: allowlist_or_dm_pairing
    verified_cells:
      - date: "2026-04-17"
        bot_username: "@AgentPlayground_bot"
        allowed_user_id: 152099202
        boot_wall_s: 10
        first_reply_wall_s: 1
        verdict: PASS
        notes: |
          `docker run -d` with 3 env vars (OPENROUTER_API_KEY,
          TELEGRAM_BOT_TOKEN, TELEGRAM_ALLOWED_USERS) + argv `gateway run -v`.
          User sent "oi" from @fcavalcantirj (uid 152099202), hermes called
          OpenRouter (auxiliary auto-detected google/gemini-3-flash-preview),
          replied in PT-BR (194 chars) within ~1s. Boot to ready ~10s.
          Multi-account: not tested (single allowed user in allowlist).
          Model choice: gateway mode does NOT honor -m flag — model comes
          from hermes's auxiliary auto-detect. For production, recommend
          sh-chaining `hermes config set model $MODEL` before `gateway run -v`.
        category: PASS

  # Discord, Slack, WhatsApp, Signal, Matrix — claimed by upstream docs
  # (https://hermes-agent.nousresearch.com/docs/user-guide/messaging: "all
  # from a single gateway process"). NOT empirically validated yet; no
  # bot/webhook/test creds available. Add entries here only after a real
  # round-trip PASS against each.
