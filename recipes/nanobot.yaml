apiVersion: ap.recipe/v0.2
name: nanobot
display_name: nanobot
description: |
  Ultra-lightweight personal AI agent by HKUDS — "99% fewer lines of
  code than OpenClaw", pure Python, pip-installable as `nanobot-ai`.
  The project PicoClaw was originally ported from this codebase.
  nanobot dropped LiteLLM on 2026-03-21 in favor of native openai +
  anthropic SDKs; the `openai_compat_provider` handles OpenRouter +
  any OpenAI-compatible endpoint. This recipe targets `nanobot agent
  -m` (non-interactive one-shot) with a pre-templated config.json
  holding the OpenRouter credentials.

source:
  repo: https://github.com/HKUDS/nanobot
  ref: main
  ref_note: |
    nanobot is actively developed (releases weekly). v0 recipe tracks
    main; pyproject reports version 0.1.5.post1 at recon date.
  upstream_version: v0.1.5.post1

build:
  mode: upstream_dockerfile
  dockerfile: Dockerfile
  context: .
  notes: |
    Upstream Dockerfile uses `ghcr.io/astral-sh/uv:python3.12-bookworm-slim`
    as base, installs Node.js 20 for the WhatsApp bridge, then
    `uv pip install --system --no-cache .` for the nanobot package.
    ENTRYPOINT is `entrypoint.sh` which checks writability of
    ~/.nanobot and `exec nanobot "$@"`. Default CMD is `status`.
    Image size ~842 MB — smaller than hermes (5.2 GB) or openclaw
    (~5 GB), larger than picoclaw (200 MB) or nullclaw (8 MB).
    Cold build time ~2-3 min on M-series (uv is fast).

    Runs as USER nanobot (uid 1000), HOME=/home/nanobot. Bind-mount
    at /home/nanobot/.nanobot must be writable by uid 1000.

runtime:
  provider: openrouter
  process_env:
    api_key: OPENROUTER_API_KEY
    api_key_fallback: null
    base_url: null    # goes into config.json providers.openrouter.api_base
    model: null       # goes into config.json agents.defaults.model
  volumes:
    - name: nanobot_home
      host: per_session_tmpdir
      container: /home/nanobot/.nanobot
      mode: rw
      ephemeral: true
      owner_uid: 1000
      notes: |
        NANOBOT_HOME. `~/.nanobot/config.json` is the authoritative
        config file (per `nanobot/config/loader.py:25`). First run
        populates workspace/, cron/, media/, etc. under this dir.
  warnings:
    - id: config_json_is_authoritative
      rule: OpenRouter credentials MUST be written to ~/.nanobot/config.json before `nanobot agent` runs
      reason: |
        `nanobot/providers/openai_compat_provider.py` reads api_key
        from `providers.openrouter.api_key` in config.json (not
        from env vars). `_match_provider` parses the model string
        prefix (`openrouter/...`) to find the provider entry, and
        requires `p.api_key` to be set. The sh bootstrap writes
        config.json via heredoc with `${OPENROUTER_API_KEY}`
        interpolated at container runtime from the process env.
    - id: sh_entrypoint_override
      rule: Override --entrypoint to sh so we can write config before running nanobot
      reason: |
        Default ENTRYPOINT is `entrypoint.sh` which runs a single
        nanobot subcommand. To chain "write config + run agent" in
        one container lifetime without persistent volumes, override
        --entrypoint to sh and run our own script. Works because
        the nanobot binary is installed to /usr/local/bin at build
        time and stays on PATH.
    - id: uid_1000_writable_mount
      rule: Container runs as USER nanobot (uid 1000) — bind mount must be writable for that UID
      reason: |
        Dockerfile sets `USER nanobot` with useradd -u 1000. On
        macOS Docker Desktop the bind-mount shim handles UID
        remapping transparently. On Linux hosts, the mounted
        tmpdir needs to be chowned to 1000:1000 OR we skip the
        mount (state is ephemeral to the container anyway).
    - id: no_markdown_for_clean_stdout
      rule: Use --no-markdown on `agent -m` to avoid ANSI escapes in stdout
      reason: |
        Default is Rich-rendered Markdown which injects ANSI color
        codes into stdout. `--no-markdown` emits plain text and
        `response_contains_name` matches cleanly.

invoke:
  mode: cli-passthrough
  spec:
    entrypoint: sh
    argv:
      - -c
      - |
        set -e
        mkdir -p /home/nanobot/.nanobot
        cat > /home/nanobot/.nanobot/config.json <<EOF
        {
          "agents": {
            "defaults": {
              "model": "$MODEL",
              "provider": "openrouter",
              "workspace": "/home/nanobot/.nanobot/workspace"
            }
          },
          "providers": {
            "openrouter": {
              "api_key": "${OPENROUTER_API_KEY}"
            }
          }
        }
        EOF
        nanobot agent -m "$PROMPT" --no-markdown
    argv_note: |
      Two-step sh chain:
        1. Write ~/.nanobot/config.json with `agents.defaults.model`
           set to the BARE model ID (e.g. `openai/gpt-4o-mini`) and
           `agents.defaults.provider = "openrouter"` to FORCE provider
           selection. Also sets `providers.openrouter.api_key` from
           process env.
        2. Run `nanobot agent -m "<prompt>" --no-markdown`.

      **Why `provider: "openrouter"` must be explicit (not "auto"):**
      nanobot's `_match_provider` in `config/schema.py:228` uses the
      model string prefix (e.g. `openrouter/...`) to select the
      provider in auto mode, but then sends the FULL model string
      (prefix included) to OpenRouter — which rejects
      `openrouter/openai/gpt-4o-mini` as an invalid model ID because
      OpenRouter's own IDs are `openai/gpt-4o-mini` (no prefix).
      Setting `provider: "openrouter"` explicitly short-circuits
      the prefix match so the bare model string flows through to
      the API call. Empirically verified 2026-04-15 (first attempt
      with the prefix returned HTTP 400 "not a valid model ID").
    stdout_filter:
      engine: awk
      program: "{print}"  # v0 pass-through; refine after first run
    session_id_capture:
      engine: none

smoke:
  prompt: "What is nanobot? Reply in one short sentence starting with 'nanobot is'."
  pass_if: response_contains_name
  case_insensitive: true
  timeout_s: 90
  verified_cells:
    - model: openai/gpt-4o-mini
      verdict: PASS
      notes: |
        Reply: "Nanobot is a personal AI assistant designed to solve
        problems by taking action rather than just providing
        descriptions." Took one iteration fix — initial attempt with
        `model: openrouter/openai/gpt-4o-mini` + `provider: auto`
        failed with HTTP 400 "not a valid model ID" from OpenRouter
        because nanobot's provider resolver sends the full prefixed
        string. Second attempt with `provider: "openrouter"` explicit
        + bare model ID succeeded.
      wall_time_s: 9.12
      category: PASS
      detail: ''
  known_quirks:
    - quirk: Rich streaming UI emits ANSI cursor/spinner codes even with --no-markdown
      impact: |
        The `agent -m` command always runs through nanobot's prompt_toolkit
        + Rich streaming pipeline, which injects spinner frames and cursor
        control codes into stdout as the LLM streams. `--no-markdown`
        only disables Markdown-to-ANSI rendering; it does NOT disable
        the live-update UI. For a stricter stdout match, setting TERM=dumb
        might force a simpler code path — not tested in this recipe.

metadata:
  recon_date: "2026-04-15"
  recon_by: main-conversation (direct source + built-image empirical CLI check)
  source_citations:
    - "README - inspired by OpenClaw, 99% fewer lines, PyPI package nanobot-ai"
    - "Dockerfile - uv + python3.12 bookworm, USER nanobot uid 1000, ENTRYPOINT entrypoint.sh, CMD status"
    - "entrypoint.sh - checks ~/.nanobot writability then `exec nanobot \"$@\"`"
    - "pyproject.toml - version 0.1.5.post1, project.scripts: nanobot = nanobot.cli.commands:app"
    - "nanobot/cli/commands.py:912 - def agent(-m/--message, -s/--session, -c/--config, --markdown/--no-markdown, -w/--workspace)"
    - "nanobot/config/loader.py:25 - config path ~/.nanobot/config.json (JSON)"
    - "nanobot/config/schema.py:96-134 - ProviderConfig (api_key, api_base, extra_headers); openrouter is a first-class provider"
    - "nanobot/config/schema.py:228 - _match_provider parses model prefix to select providers.<name>"
    - "nanobot/providers/openai_compat_provider.py - openrouter attribution headers baked in"
    - "2026-03-21 commit - replaced litellm with native openai + anthropic SDKs"

# ═══════════════════════════════════════════════════════════════════════════
# v0.2 DRAFT — persistent-mode gateway + channels (WIP, 2026-04-17)
# ═══════════════════════════════════════════════════════════════════════════
# Canonical docs (user-provided, load-bearing — keep in sync when recipe
# is updated):
#   https://nanobot.wiki/docs/0.1.5.post1/use-nanobot/configuration
#     Configuration Reference. Env-var override pattern:
#       NANOBOT_<SECTION>__<SUBSECTION>__<KEY>=value   (double underscore)
#       e.g. NANOBOT_CHANNELS__TELEGRAM__TOKEN=xxx
#   https://nanobot.wiki/docs/0.1.5.post1/getting-started/chat-apps
#     Per-channel configs — Telegram schema: channels.telegram.{enabled,
#     token, allowFrom[], groupPolicy, streaming, proxy}. `allowFrom` =
#     numeric Telegram user IDs (without @ prefix).
#
# KEY FACTS (canonical Telegram section, content.js id:"telegram"):
#   - schema: channels.telegram.{enabled, token, allowFrom, groupPolicy, streaming}
#   - groupPolicy: "mention" (default) | "open"
#   - allowFrom: numeric user IDs array, no @
#   - streaming: true default
#   - Run: `nanobot gateway` (foreground persistent)
#
# Battle-proven 2026-04-17: @AgentPlayground_bot round-trip PASS.

persistent:
  mode: gateway-daemon
  spec:
    entrypoint: sh
    argv:
      - -c
      - |
        set -e
        mkdir -p /home/nanobot/.nanobot
        cat > /home/nanobot/.nanobot/config.json <<EOF
        {
          "agents": {
            "defaults": {
              "provider": "openrouter",
              "model": "$MODEL"
            }
          },
          "providers": {
            "openrouter": {
              "api_key": "${OPENROUTER_API_KEY}",
              "api_base": "https://openrouter.ai/api/v1"
            }
          },
          "channels": {
            "telegram": {
              "enabled": true,
              "token": "${TELEGRAM_BOT_TOKEN}",
              "allowFrom": ["$TELEGRAM_ALLOWED_USER"],
              "groupPolicy": "mention",
              "streaming": true
            }
          }
        }
        EOF
        exec nanobot gateway
    ready_log_regex: "Telegram bot @\\w+ connected"
    health_check:
      kind: http
      port: 18790
      path: /health
    graceful_shutdown_s: 0
    sigterm_handled: false  # nanobot gateway ignores SIGTERM entirely (spike-07); runner must skip graceful and go straight to `docker rm -f`
  argv_note: |
    Two-stage bootstrap: (1) write full config.json with agents.defaults +
    providers.openrouter + channels.telegram in one heredoc. (2) exec
    `nanobot gateway` foreground persistent. OpenRouter api_key and
    bot_token interpolated from env via unquoted heredoc sh-expansion.
    Runner substitutes $MODEL + $TELEGRAM_ALLOWED_USER before docker run.
    Health HTTP endpoint on 127.0.0.1:18790/health.

# Phase 22b-06 — D-19..D-22 direct_interface for Gate A automation.
# Spike 06 PASS: nanobot serve exposes the OpenAI-compatible
# /v1/chat/completions endpoint (matches MSV's forward_to_agent.go pattern).
#
# Port: 8900 (empirical — probed in Plan 22b-06 Task 1 Part D via
#   `docker run --rm --entrypoint sh ap-recipe-nanobot -c '<minimal config>; nanobot serve'`
# then inspecting `/proc/net/tcp` inside the container, which showed a single
# LISTEN socket at `0100007F:22C4` (= 127.0.0.1:8900). Cross-confirmed by
# nanobot's own startup log line:
#   `🐈 Starting OpenAI-compatible API server`
#   `  Endpoint : http://127.0.0.1:8900/v1/chat/completions`
# `nanobot serve --help` documents `--port` but no default value; 8900 is
# the bake-time default. If a recipe ever needs to override it (port
# collision, multi-tenant), add `--port` to the persistent argv and update
# this block in lockstep.
#
# Note on persistent vs serve coexistence: this recipe's persistent block
# runs `nanobot gateway` (Telegram daemon), NOT `nanobot serve`. For Gate A
# direct_interface to actually answer, the persistent container must ALSO
# expose the OpenAI HTTP — Plan 22b-06 Task 3's verification will confirm
# whether `nanobot gateway` brings up the serve endpoint as a sibling, or
# whether the recipe needs `--mode both` or the `agent_harness` needs to
# `docker exec <cid> nanobot serve` separately. If the latter, this block
# stays accurate (it's still where /v1/chat/completions lives) and the
# harness layer wires the docker-exec lifecycle.
direct_interface:
  kind: http_chat_completions
  spec:
    port: 8900
    path: /v1/chat/completions
    auth:
      header: Authorization
      value_template: "Bearer {api_key}"
    request_template:
      model: "nanobot:main"
      messages:
        - { role: user, content: "{prompt}" }
    response_jsonpath: "$.choices[0].message.content"
    timeout_s: 60

channels:
  telegram:
    config_transport: file
    required_user_input:
      - env: TELEGRAM_BOT_TOKEN
        secret: true
        hint: Create via @BotFather /newbot.
      - env: TELEGRAM_ALLOWED_USER
        secret: false
        kind: telegram_numeric_id
        hint_url: https://t.me/userinfobot
        hint: Single numeric Telegram user ID (copy from Settings, no @).
    optional_user_input: []
    ready_log_regex: "Telegram bot @\\w+ connected"
    response_routing: per_message_origin
    multi_user_model: allowlist
    multi_account_supported: false       # nanobot channels.telegram is single-entry
    # Phase 22b event_log_regex — captured empirically in spike 01d-nanobot (2026-04-18).
    # nanobot has excellent structured logging: timestamp | level | module:function:line - message.
    # See .planning/phases/22b-agent-event-stream/22b-SPIKES/spike-01d-nanobot.md.
    event_log_regex:
      # reply_sent — fires when agent loop writes the reply out. Contains FULL reply text.
      reply_sent: "\\| INFO\\s+\\| nanobot\\.agent\\.loop:_process_message:\\d+ - Response to telegram:(?P<chat_id>\\d+)\\|[^:]+: (?P<reply_text>.+)"
      # inbound_message — when the agent begins processing a user message. Full user text captured.
      inbound_message: "\\| INFO\\s+\\| nanobot\\.agent\\.loop:_process_message:\\d+ - Processing message from telegram:(?P<chat_id>\\d+)\\|(?P<user>[^:]+): (?P<text>.+)"
      # inbound_message_raw — DEBUG-level Telegram receiver; captures even before LLM processing.
      # Useful for latency measurements (receive-to-reply) but not required for reply_sent/inbound_message primary path.
      inbound_raw: "\\| DEBUG\\s+\\| nanobot\\.channels\\.telegram:_on_message:\\d+ - Telegram message from (?P<chat_id>\\d+)\\|(?P<user>[^:]+): (?P<text>.+)"
      # agent_error — generic ERROR/WARNING capture.
      agent_error: "\\| (?:ERROR|CRITICAL|WARNING)\\s+\\| nanobot\\.[^:]+:[^:]+:\\d+ - (?P<message>.+)"
    verified_cells:
      - date: "2026-04-17"
        bot_username: "@AgentPlayground_bot"
        allowed_user_id: 152099202
        model: anthropic/claude-haiku-4.5
        boot_wall_s: 18
        verdict: PASS
        notes: |
          `docker run -d` with OPENROUTER_API_KEY + TELEGRAM_BOT_TOKEN env.
          sh-chain writes config.json (agents+providers+channels.telegram)
          then `nanobot gateway`. Boot log shows "Telegram channel enabled"
          + "Telegram bot @AgentPlayground_bot connected" + health endpoint
          on 18790. User confirmed round-trip PASS ("worked"). Nanobot
          startup is slower than others (~18s from docker run to ready)
          because it creates SOUL.md/USER.md/HEARTBEAT.md/memory bootstrap
          files on first run and initializes git store at ~/.nanobot/workspace.
      - date: "2026-04-18"
        bot_username: "@AgentPlayground_bot"
        allowed_user_id: 152099202
        model: anthropic/claude-haiku-4.5
        boot_wall_s: 23.36
        first_reply_wall_s: ~6
        reply_sample: "ok-nanobot-01"
        verdict: PASS
        notes: |
          Phase 22b spike 01d-nanobot. Persistent /start via /v1/agents/:id/start.
          User sent `spk01d please reply with only: ok-nanobot-01`;
          nanobot replied `ok-nanobot-01`. Canonical 3-line sequence captured
          in docker logs:
            21:25:57 DEBUG nanobot.channels.telegram:_on_message:921  Telegram message from 152099202|fcavalcantirj: spk01d...
            21:25:58 INFO  nanobot.agent.loop:_process_message:666    Processing message from telegram:152099202|fcavalcantirj: spk01d...
            21:26:03 INFO  nanobot.agent.loop:_process_message:761    Response to telegram:152099202|fcavalcantirj: ok-nanobot-01
          reply_sent regex captures full reply_text; correlation_id extractable
          directly from reply (like picoclaw). 4 regexes authored.
        category: PASS
        spike_artifact: ".planning/phases/22b-agent-event-stream/22b-SPIKES/spike-01d-nanobot.md"
        category: PASS

  # Discord, Slack, WhatsApp, Email, Matrix (not installed by default,
  # needs pip install nanobot-ai[matrix]) — all channels nanobot supports
  # via canonical docs channel registry. NOT empirically validated yet.
