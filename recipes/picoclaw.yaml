apiVersion: ap.recipe/v0.2
name: picoclaw
display_name: PicoClaw
description: |
  Ultra-lightweight personal AI assistant written in Go (sipeed/picoclaw).
  <10MB RAM, single-binary, runs on $10 hardware. Multi-provider via
  LiteLLM-style `model_list` config. This recipe targets the non-interactive
  one-shot path (`picoclaw agent -m`) with a pre-templated config that
  bypasses the upstream entrypoint's interactive `onboard` flow.

source:
  repo: https://github.com/sipeed/picoclaw
  ref: main
  ref_note: |
    Picoclaw is v0.2.4+ at the time of recon, actively developed, weekly
    releases. v0 of this recipe tracks main.
  upstream_version: v0.2.4+

build:
  mode: upstream_dockerfile
  dockerfile: docker/Dockerfile
  context: .
  notes: |
    Upstream multi-stage Dockerfile. Stage 1: golang:1.25-alpine builds
    the static Go binary via `make build`. Stage 2: alpine:3.23 with
    ca-certificates + tzdata + curl, copies /usr/local/bin/picoclaw +
    docker/entrypoint.sh. Image size ~200 MB — dramatically smaller than
    hermes (5.19 GB) or openclaw (5 GB). Build is fast (~2 min on M-series)
    because Go has no Python or Node dep pulls.

    IMPORTANT: The upstream entrypoint (docker/entrypoint.sh) is
    two-stage — on a fresh container it runs `picoclaw onboard`,
    prints "First-run setup complete. Edit config.json then restart",
    and EXITS. Default CMD after first-run is `picoclaw gateway`.
    Neither fits a one-shot recipe. We bypass by overriding
    --entrypoint to sh and running our own init+invoke script.

runtime:
  provider: openrouter
  process_env:
    api_key: OPENROUTER_API_KEY
    api_key_fallback: null
    base_url: null    # baked into config.json.model_list[0].api_base
    model: null       # baked into config.json.model_list[0].model
  volumes:
    - name: picoclaw_home
      host: per_session_tmpdir
      container: /root/.picoclaw
      mode: rw
      ephemeral: true
      owner_uid: 0     # alpine image runs as root inside the container
      notes: |
        PICOCLAW_HOME. First-run creates workspace/ and config.json.
        We pre-template config.json ourselves in the bootstrap shell
        script so onboard never runs. Ephemeral mount: per-session
        state dies at container teardown.
  warnings:
    - id: no_shell_entrypoint_bypass
      rule: Must override --entrypoint sh to bypass upstream entrypoint.sh
      reason: |
        docker/entrypoint.sh does `picoclaw onboard` on fresh state
        then `exit 0`. The default CMD after first-run is
        `picoclaw gateway`. Neither allows a one-shot `agent -m`
        call. --entrypoint sh lets us run init+invoke in one container.
    - id: no_bash_in_image
      rule: Use `sh`, not `bash`, for the entrypoint override
      reason: |
        Picoclaw's runtime image is alpine:3.23 which ships busybox/ash
        as /bin/sh. bash is not installed. The recipe entrypoint field
        is `sh` (not `bash`) and the script uses POSIX-compatible syntax.
    - id: config_model_list_routing
      rule: |
        The `model_name` in agents.defaults must reference an entry in
        model_list[] with matching `model_name`. The actual provider
        routing comes from that entry's `api_base` + `api_key`.
      reason: |
        Picoclaw uses LiteLLM-style model routing. The `model` field in
        model_list[] looks like `openai/gpt-4o-mini` but the actual
        provider routing is determined by `api_base` — we point it at
        https://openrouter.ai/api/v1 so LiteLLM routes through OpenRouter.

invoke:
  mode: cli-passthrough
  spec:
    entrypoint: sh
    argv:
      - -c
      - |
        set -e
        mkdir -p /root/.picoclaw/workspace
        cat > /root/.picoclaw/config.json <<EOF
        {
          "agents": {
            "defaults": {
              "model_name": "openrouter-default",
              "workspace": "/root/.picoclaw/workspace"
            }
          },
          "model_list": [
            {
              "model_name": "openrouter-default",
              "model": "$MODEL",
              "api_key": "${OPENROUTER_API_KEY}",
              "api_base": "https://openrouter.ai/api/v1"
            }
          ]
        }
        EOF
        picoclaw agent -m "$PROMPT"
    argv_note: |
      THREE-stage bootstrap inside a single container:
        1. mkdir workspace dir (satisfies picoclaw's state layout expectations)
        2. write config.json with the openrouter model routed via api_base
        3. run `picoclaw agent -m "$PROMPT"` (non-interactive one-shot)

      Substitution order: the runner replaces $PROMPT and $MODEL BEFORE
      docker run, so by the time sh -c receives the script, those are
      literal values. $OPENROUTER_API_KEY is NOT substituted by the
      runner — it's interpolated by sh at container runtime from the
      process env (which docker -e sets).

      The `${OPENROUTER_API_KEY}` inside the heredoc uses sh's variable
      expansion because the EOF delimiter is unquoted — if it were
      'EOF' (quoted), expansion would be disabled and the literal
      string would land in config.json, breaking auth.
    stdout_filter:
      engine: awk
      program: "{print}"  # v0 pass-through; picoclaw output is already terse
    session_id_capture:
      engine: none

smoke:
  prompt: "who are you?"
  pass_if: response_contains_name
  case_insensitive: true
  timeout_s: 90
  verified_cells:
    - model: openai/gpt-4o-mini
      verdict: PASS
      notes: |
        Reply: "🦞 I am Picoclaw, an AI assistant designed to help you..."
        Case-insensitive substring match on "picoclaw" in the agent's
        self-identification. Model DID adopt the picoclaw persona cleanly,
        unlike openclaw which needed a larger/more capable model.

      wall_time_s: 2.54
      category: PASS
      detail: ''
metadata:
  recon_date: "2026-04-15"
  recon_by: |
    main-conversation (direct source + built-image empirical testing,
    Solvr query pending as of commit but not load-bearing — the CLI's
    own --help output revealed the one-shot path).
  source_citations:
    - "README.md - lists picoclaw as Go 1.25, MIT, v0.2.4"
    - "docker/Dockerfile - multi-stage alpine, ENTRYPOINT [/entrypoint.sh]"
    - "docker/entrypoint.sh - two-stage onboard-then-exit pattern"
    - "cmd/picoclaw/main.go - cobra command tree, agent.NewAgentCommand registered"
    - "picoclaw agent --help (empirical) - flags: -m/--message, --model, -s/--session, -d/--debug"
    - "config/config.example.json - agents.defaults.model_name + model_list[] schema"
    - ".env.example - OPENROUTER_API_KEY listed under LLM Provider"

# ═══════════════════════════════════════════════════════════════════════════
# v0.2 DRAFT — persistent-mode gateway + channel_list (picoclaw, 2026-04-17)
# ═══════════════════════════════════════════════════════════════════════════
# Canonical docs:
#   https://github.com/sipeed/picoclaw/tree/main/docs/channels
#   https://github.com/sipeed/picoclaw/blob/main/docs/channels/telegram/README.md
#   https://github.com/sipeed/picoclaw/blob/main/docs/guides/configuration.md
#   https://github.com/sipeed/picoclaw/blob/main/docs/guides/chat-apps.md
#   https://github.com/sipeed/picoclaw/blob/main/docs/security/security_configuration.md
#
# SCHEMA-FROM-REALITY NOTES (empirical, 2026-04-17):
#
#   a) Root key is `channel_list` (NOT `channels`). Confirmed by picoclaw's
#      migrated config.json output.
#   b) Telegram `token` lives in `config.json.channel_list.telegram.settings.token`
#      (NOT at channel-top-level as the docs/channels/telegram/README.md
#      example suggests — that snippet describes a v0 shape that picoclaw
#      migrates away from; in v3 the `token` is stripped from top level
#      and never relocated, so top-level placement results in
#      `enabled_channels=0` at startup).
#   c) `.security.yml` (at ~/.picoclaw/.security.yml) holds LLM api_keys
#      only — NOT channel tokens. docs/security/security_configuration.md
#      shows `channels.telegram.token` in .security.yml but that path does
#      NOT activate the token for picoclaw v3 (empirically verified:
#      channel stays offline). Token MUST be in config.json settings.token.
#   d) `allow_from` is an array of numeric user IDs (e.g. ["152099202"]).
#      Empty = all users allowed (dangerous default).
#   e) `picoclaw gateway -d` is the persistent command (-d for debug, not
#      daemon — picoclaw is foreground blocking).

persistent:
  mode: gateway-daemon
  spec:
    entrypoint: sh
    argv:
      - -c
      - |
        set -e
        mkdir -p /root/.picoclaw/workspace

        # config.json — channel_list + model_list routing (no secrets here)
        cat > /root/.picoclaw/config.json <<EOF
        {
          "version": 3,
          "agents": { "defaults": { "model_name": "openrouter-default", "workspace": "/root/.picoclaw/workspace" } },
          "model_list": [{
            "model_name": "openrouter-default",
            "model": "$MODEL",
            "api_base": "https://openrouter.ai/api/v1"
          }],
          "channel_list": {
            "telegram": {
              "enabled": true,
              "type": "telegram",
              "allow_from": ["$TELEGRAM_ALLOWED_USER"],
              "settings": {
                "token": "${TELEGRAM_BOT_TOKEN}"
              }
            }
          }
        }
        EOF

        # .security.yml — LLM api_key only, referenced by model_name
        cat > /root/.picoclaw/.security.yml <<EOF
        model_list:
          openrouter-default:
            api_keys:
              - "${OPENROUTER_API_KEY}"
        EOF

        exec picoclaw gateway -d
    ready_log_regex: "Telegram bot connected username="
    health_check:
      kind: http
      port: 18790
      path: /health
    graceful_shutdown_s: 2
    sigterm_handled: true
  argv_note: |
    Three-stage bootstrap inside one container: (1) write config.json with
    channel_list + model routing (api_key intentionally omitted — lives in
    .security.yml per v3 schema), (2) write .security.yml with OpenRouter
    api_key keyed by model_name, (3) exec `picoclaw gateway -d` foreground.
    The runner substitutes $MODEL and $TELEGRAM_ALLOWED_USER before docker
    run; ${OPENROUTER_API_KEY} and ${TELEGRAM_BOT_TOKEN} expand inside sh
    from the env vars docker -e injects (unquoted EOF delimiter).

channels:
  telegram:
    config_transport: file              # config.json + .security.yml split
    required_user_input:
      - env: TELEGRAM_BOT_TOKEN
        secret: true
        hint: Create via @BotFather /newbot.
      - env: TELEGRAM_ALLOWED_USER
        secret: false
        kind: telegram_numeric_id
        hint_url: https://t.me/userinfobot
        hint: |
          Single numeric Telegram user ID. Copy from @userinfobot.
          (picoclaw's allow_from is an array; runner wraps single value.)
    optional_user_input: []
    ready_log_regex: "Telegram bot connected username="
    response_routing: per_message_origin   # bot replies in the chat the sender messaged from
    multi_user_model: allowlist
    verified_cells:
      - date: "2026-04-17"
        bot_username: "@AgentPlayground_bot"
        allowed_user_id: 152099202
        model: anthropic/claude-haiku-4.5
        boot_wall_s: 12
        first_reply_wall_s: 3
        reply_sample: "Oi Felipe! 👋 Tudo bem? Como posso te ajudar?"
        verdict: PASS
        notes: |
          `docker run -d` with OPENROUTER_API_KEY + TELEGRAM_BOT_TOKEN env.
          Hand-crafted config.json (channel_list.telegram.settings.token)
          + .security.yml (model_list.openrouter-default.api_keys[]).
          User sent "Oi" from @fcavalcantirj, picoclaw's main agent
          routed via default match, llm_request to claude-haiku-4.5 over
          OpenRouter, turn_end in 1846ms (~1.8s LLM), sendMessage to
          Telegram ok=true. Round-trip ~3s wall.
        category: PASS

  # Discord, Slack, WhatsApp, Matrix, Feishu, Line, QQ, OneBot, DingTalk,
  # Wecom, Weixin, VK, MaixCam, Pico — picoclaw v3 channel_list exposes
  # all of these (empirically confirmed by its own migrated config). Each
  # has its own settings.* shape. NOT empirically validated yet — add
  # entries under `channels.<id>.verified_cells[]` only after round-trip PASS.
