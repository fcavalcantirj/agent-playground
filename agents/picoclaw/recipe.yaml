# agents/picoclaw/recipe.yaml
# Phase 02.5 reference recipe #2 of 2 (picoclaw = hardest path).
# Purpose: exercise node runtime + git_build install + fifo chat bridge +
# secret_file_mount auth via filesystem template + full lifecycle
# (postCreate sanity, postStart daemon liveness, postAttach FIFO verify).
#
# STANDALONE in 02.5 — NOT a flavor of openclaw (D-40b).
# Phase 4 re-expresses as a flavor once openclaw ships in the catalog.
#
# A7 resolution (see agents/picoclaw/README.md + 02.5-08-scratch-a7.md):
# picoclaw HAS first-class OpenRouter support via pkg/providers/factory_provider.go
# + pkg/providers/openai_compat. Declared in providers[] below. However, picoclaw
# reads all keys from ~/.picoclaw/.security.yml (NOT env vars), so the current
# templates/security.yml.tmpl only renders the Anthropic key — OpenRouter coverage
# for Gate A is carried by aider (Plan 07) per D-47.

id: picoclaw
name: PicoClaw
description: Compact AI coding agent (sipeed/picoclaw) — Go binary, FIFO chat bridge, .security.yml BYOK
version: "0.1.0"
license: MIT
category: claw
tier_badge: tier-1

runtime:
  family: node
  version: "22"
  image: ap-picoclaw:v0.2.0-773a94c
  resources:
    memory_mib: 1024
    cpus: 1.0
    pids_limit: 256

install:
  # picoclaw is built from source in agents/picoclaw/Dockerfile using a
  # golang:1.25-alpine multi-stage build. The install block here is
  # informational — the schema forces git_build to pin a 40-char SHA,
  # which is the substantive guarantee we want (REC-07).
  type: git_build
  git:
    repo: https://github.com/sipeed/picoclaw
    rev: 773a94c41437d21c7cb1fcc429cee1ac605dd509
    build_cmd:
      - make
      - build

lifecycle:
  # exec_per_message mode: the picoclaw binary is invoked fresh per
  # user turn, so there is no long-running daemon to probe. The only
  # meaningful gate is that the binary is present and loads the
  # bind-mounted .security.yml without error. `picoclaw version`
  # exits 0 as a sanity check without touching any network.
  postCreateCommand:
    - picoclaw
    - --no-color
    - version
  waitFor: postCreateCommand

launch:
  # The container's PID 1 is `tini → /entrypoint.sh` from ap-base. The
  # entrypoint runs ttyd + tmux + (optionally) AP_AGENT_CMD in a chat
  # window, then loops forever on `tmux has-session`. It never execs
  # the recipe's launch.cmd — it uses its own supervision chain. So
  # the cmd here is a no-op; what matters is that AP_AGENT_CMD is
  # CLEARED (env block below) so the entrypoint doesn't try to spawn
  # a broken `picoclaw agent --session cli:default` (no --model) in
  # tmux. chat_io.mode=exec_per_message handles all agent invocations
  # via `docker exec` per message.
  cmd:
    - sleep
    - infinity
  workdir: /home/agent
  env:
    AP_AGENT_CMD: ""

chat_io:
  mode: exec_per_message
  response_timeout_sec: 120
  exec_per_message:
    # picoclaw has a one-shot --message mode that reads config + model
    # from /home/agent/.picoclaw/.security.yml (rendered from the
    # security-yml template) and returns a single reply to stdout.
    # Using exec mode avoids the FIFO/tmux chat-window complexity and
    # matches the aider/hermes pattern end-to-end.
    cmd_template:
      - picoclaw
      - --no-color
      - agent
      - --model
      - "{model}"
      - --message
      - "{text}"
    docker_exec_user: agent

auth:
  mechanism: secret_file_mount
  headless_safe: true
  env:
    EDITOR: "vim"
  files:
    - secret: anthropic-api-key
      target: /home/agent/.picoclaw/.security.yml
      mode: "0600"
      template: security-yml
  secrets_schema:
    - name: anthropic-api-key
      description: "Anthropic API key (BYOK) — rendered into .security.yml at container start"
      required: true
    - name: openrouter-api-key
      description: "OpenRouter API key (BYOK) — declared for A7=green, not yet wired into the template (see Plan 07 aider for Gate A OpenRouter proof)"
      required: false

providers:
  - id: anthropic
    api_base: https://api.anthropic.com/v1
    api_key_env_var: ANTHROPIC_API_KEY
    auth_style: x-api-key
  - id: openrouter
    api_base: https://openrouter.ai/api/v1
    api_key_env_var: OPENROUTER_API_KEY
    auth_style: bearer

models:
  # picoclaw's CLI `--model` flag takes the bare model_name from
  # config.json (`claude-sonnet-4.6`) — the `:<n>` suffix seen in
  # security.yml model_list keys is an api_key-index, NOT part of the
  # CLI model name. The Dockerfile's jq step maps this picoclaw name
  # onto the canonical Anthropic wire name `anthropic/claude-sonnet-4-6`.
  - id: claude-sonnet-4.6
    provider: anthropic
    max_input_tokens: 200000
    max_output_tokens: 8192

model_flag: --model

isolation:
  tier: strict
  cap_drop:
    - ALL
  # ap-base's gosu-based privilege drop (root → uid 10000 agent) at
  # entrypoint PID 1 requires these caps. Same set Phase 2 picoclaw used.
  cap_add:
    - CHOWN
    - SETUID
    - SETGID
    - SETPCAP
  no_new_privs: true
  read_only_rootfs: true

persistent_state:
  tmpfs:
    - path: /tmp
      size_mib: 128
    - path: /run
      size_mib: 16
    # picoclaw writes session journal state under
    # /home/agent/.picoclaw/workspace/. The baked config.json and the
    # bind-mounted .security.yml stay accessible because we only
    # tmpfs the workspace subdir, not the whole .picoclaw/ tree.
    - path: /home/agent/.picoclaw/workspace
      size_mib: 64

frontend:
  display_name: PicoClaw
  slug: picoclaw
  icon: lobster
  category_badge: "Compact coder"
  tooltip: "PicoClaw — compact AI coding agent"
  tier_badge: tier-1

metadata:
  source_repo: https://github.com/sipeed/picoclaw
  source_sha: 773a94c41437d21c7cb1fcc429cee1ac605dd509
  last_verified: "2026-04-14"
  bootstrap_generated: false
