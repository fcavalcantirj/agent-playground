# agents/aider/recipe.yaml
# Phase 02.5 reference recipe #1 of 2 (aider = simplest path).
# Purpose: exercise python runtime + pip install + exec_per_message bridge +
# env_var auth + anthropic + openrouter providers end-to-end.
# Design notes: no template files, no long-running process, no config file.

id: aider
name: Aider
description: AI pair programmer in your terminal
version: "0.1.0"
license: Apache-2.0
category: pair_programmer
tier_badge: tier-1

runtime:
  # Fallback to Python 3.12 per Plan 07 fallback instructions.
  # Assumption A3 (Python 3.13 supports aider-chat) was FALSIFIED at L2 verify:
  # aider-chat 0.86.2 declares `requires_python: <3.13,>=3.10` AND hard-pins
  # numpy==1.26.4 which has no cp313 wheel (sdist build fails without gcc
  # inside the sandbox). See .planning/phases/02.5-recipe-manifest-reshape/
  # 02.5-07-SUMMARY.md §"A3 Resolution" for evidence and the PyPI metadata
  # snapshot. ap-runtime-python:v0.1.0-3.13 remains the primary base image
  # for future recipes; the 3.12 variant is added as a fallback tier.
  family: python
  version: "3.12"
  image: ap-runtime-python:v0.1.0-3.12
  resources:
    # 2 GiB — the peak of `uv tool install aider-chat` is around
    # ~1.5 GiB of combined tmpfs + heap during wheel extraction.
    memory_mib: 2048
    cpus: 1.0
    pids_limit: 256

install:
  type: pip
  package: aider-chat
  version: ">=0.60"

lifecycle:
  # Dispatch uses `uv tool install` (not `uv pip install --system`) because
  # the Plan 03 lifecycle runner exec-s hooks as user `agent`, and
  # /usr/local/lib/python3.12/site-packages is root-owned — a plain
  # `uv pip install --system` fails with EACCES. `uv tool install` installs
  # aider into /home/agent/.local/share/uv/tools/aider-chat/ and symlinks
  # the entrypoint into /home/agent/.local/bin/aider, which is already on
  # PATH for the agent user (see deploy/ap-runtime-python/Dockerfile).
  # install.type remains `pip` to reflect the package source (PyPI) —
  # `uv tool install` is uv's isolated-tool flavor of a pip install.
  postCreateCommand:
    - uv
    - tool
    - install
    - --no-cache
    - aider-chat
  postCreate_timeout_sec: 600
  waitFor: postCreateCommand

launch:
  # exec_per_message recipes DO need a long-running main process — the
  # container's PID 1 must stay alive between chat messages so the
  # ExecBridge can `docker exec aider ...` into it per message.
  # `sleep infinity` is a portable keep-alive that matches the image
  # default behavior (bash -lc "tail -f /dev/null") without fighting
  # the sandbox's read-only rootfs. Gate A verifies this end-to-end.
  cmd:
    - sleep
    - infinity
  workdir: /home/agent

chat_io:
  mode: exec_per_message
  # 240s covers worst-case aider+litellm retry behavior — aider retries 9x
  # with exponential backoff (0.2 + 0.5 + 1 + 2 + 4 + 8 + 16 + 32 = ~64s
  # pure sleep) before giving up. A 402/credit error path plus network
  # round-trips comfortably fits 4 minutes; 120s produced false timeouts.
  response_timeout_sec: 240
  exec_per_message:
    # Placeholder substitution: ExecBridge replaces `{text}` with the
    # user message and `{model}` with the chosen model id. This keeps
    # --message and --model next to their values so aider's argparse
    # interprets them correctly — appending at the end of the template
    # (Phase 2 shape) produces a malformed argv for aider.
    cmd_template:
      - aider
      - --no-auto-commits
      - --no-dirty-commits
      - --no-stream
      - --yes-always
      - --model
      - "{model}"
      - --message
      - "{text}"
    docker_exec_user: agent

auth:
  mechanism: env_var
  headless_safe: true
  env:
    ANTHROPIC_API_KEY: "secret:anthropic-api-key"
    OPENROUTER_API_KEY: "secret:openrouter-api-key"
  files: []
  secrets_schema:
    - name: anthropic-api-key
      description: "Anthropic API key (BYOK)"
      required: false
    - name: openrouter-api-key
      description: "OpenRouter API key (BYOK)"
      required: false

providers:
  - id: anthropic
    api_base: https://api.anthropic.com/v1
    api_key_env_var: ANTHROPIC_API_KEY
    auth_style: x-api-key
  - id: openrouter
    api_base: https://openrouter.ai/api/v1
    api_key_env_var: OPENROUTER_API_KEY
    auth_style: bearer

models:
  # Cost-ascending per D-48. Matrix picks models[0] matching the provider.
  - id: claude-haiku-4-5-20251001
    provider: anthropic
    max_input_tokens: 200000
    max_output_tokens: 8192
  - id: openrouter/auto
    provider: openrouter
    max_input_tokens: 200000
    max_output_tokens: 8192

model_flag: --model

isolation:
  tier: strict
  cap_drop: [ALL]
  # ap-base's entrypoint runs gosu to drop PID 1 from root → agent. gosu
  # needs CAP_SETUID + CAP_SETGID; CAP_CHOWN is used by the entrypoint's
  # ownership fixups on the per-session tmpfs. Same set picoclaw uses.
  cap_add:
    - CHOWN
    - SETUID
    - SETGID
    - SETPCAP
  no_new_privs: true
  read_only_rootfs: true

persistent_state:
  tmpfs:
    # /tmp is the uv extraction scratch dir during `uv tool install`.
    # aider + numpy + tree_sitter_language_pack + litellm + friends
    # peak-extract ~700 MB — 1 GB gives headroom.
    - path: /tmp
      size_mib: 1024
    - path: /run
      size_mib: 16
    - path: /home/agent/.aider
      size_mib: 64
    # `uv tool install --no-cache aider-chat` writes into
    # /home/agent/.local/share/uv/tools/ + /home/agent/.local/bin/ .
    # The handler mounts /home/agent/* tmpfs with uid=10000,gid=10000,
    # mode=0755 and without noexec so aider's launcher script runs.
    - path: /home/agent/.local
      size_mib: 1024
    - path: /home/agent/.cache
      size_mib: 256

frontend:
  display_name: Aider
  slug: aider
  icon: code
  category_badge: "AI pair programmer"
  tooltip: "Aider — AI pair programming in your terminal"
  tier_badge: tier-1

metadata:
  source_repo: https://github.com/Aider-AI/aider
  source_sha: f09d70659ae90a0d068c80c288cbb55f2d3c3755
  last_verified: "2026-04-14"
  bootstrap_generated: false
