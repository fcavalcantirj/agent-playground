id: oncreate-secret
name: onCreate With Secret
runtime:
  family: python
install:
  type: pip
  package: pkg
lifecycle:
  onCreateCommand:
    - ["echo", "secret:anthropic-api-key"]
launch:
  cmd: ["pkg", "--help"]
chat_io:
  mode: exec_per_message
  exec_per_message:
    cmd_template: ["pkg", "chat"]
isolation:
  tier: strict
