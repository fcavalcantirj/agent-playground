name: Recipe lint + tests

on:
  push:
    branches: [main]
    paths:
      - 'tools/**'
      - 'recipes/**'
      - 'docs/RECIPE-SCHEMA.md'
  pull_request:
    branches: [main]
    paths:
      - 'tools/**'
      - 'recipes/**'
      - 'docs/RECIPE-SCHEMA.md'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: make install-tools

      - name: Run lint + tests
        run: make check
