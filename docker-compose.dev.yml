version: "3.8"

# Local development stack for Agent Playground.
#
# Brings up:
#   - Postgres 17 (hosts both the app DB and Temporal's persistence DB)
#   - Temporal (auto-setup image; creates its own schema on first run)
#   - Temporal Web UI on http://localhost:8233
#   - Redis 7 for sessions / rate limiting / ephemeral state
#
# All ports are bound to 127.0.0.1 — never expose these to the network.
# Run `deploy/dev/init-db.sh` after first startup to create the `agent_playground` database.

services:
  postgresql:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.29.3
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    ports:
      - "127.0.0.1:7233:7233"
    restart: on-failure

  temporal-ui:
    image: temporalio/ui:2.34.0
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "127.0.0.1:8233:8080"

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Phase 19 api_server — opt-in via `docker compose --profile api up`.
  # Native dev path is `make dev-api` (uvicorn --reload against host postgres).
  # This service is for container-mode local dev and for CI smoke tests.
  api_server:
    profiles: [api]
    build:
      context: .
      dockerfile: tools/Dockerfile.api
      args:
        DOCKER_GID: ${DOCKER_GID:-999}
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      AP_ENV: dev
      AP_TRUSTED_PROXY: "false"
      AP_MAX_CONCURRENT_RUNS: "2"
      AP_RECIPES_DIR: /app/recipes
      DATABASE_URL: postgresql+asyncpg://temporal:temporal@postgresql:5432/agent_playground_api
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./recipes:/app/recipes:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
